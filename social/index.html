<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snipepro - Social</title>
<style>
  * { box-sizing: border-box; }
  html, body { min-height: 100%; margin: 0; font-family: 'gg sans', 'Helvetica Neue', Arial, sans-serif; background: #05050f; color: #dbdee1; display: flex; align-items: center; justify-content: center; }
  @keyframes drift { 0%,100% { transform: translate3d(0,0,0) scale(1); } 50% { transform: translate3d(14px,-14px,0) scale(1.04); } }
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
      radial-gradient(circle at 20% 25%, rgba(255,94,155,0.24), transparent 22%),
      radial-gradient(circle at 75% 18%, rgba(255,194,87,0.16), transparent 20%),
      radial-gradient(circle at 70% 78%, rgba(56,194,255,0.14), transparent 26%),
    linear-gradient(160deg, rgba(16,10,24,0.96), rgba(5,5,15,0.98));
    z-index: 0;
  }
  body::before, body::after { animation: drift 18s ease-in-out infinite; }
  body::after {
    content: "SOCIAL";
    position: fixed;
    left: -22px;
    top: 20px;
    font-size: 13vw;
    font-weight: 900;
    letter-spacing: 0.22em;
    color: rgba(255,255,255,0.03);
    transform: rotate(-90deg);
    transform-origin: left top;
    z-index: 0;
    pointer-events: none;
  }
  #wrap { position: relative; z-index: 1; width: min(92vw, 360px); display: flex; flex-direction: column; gap: 14px; padding: 22px; }
  #brand-tag { font-size: 22px; font-weight: 900; letter-spacing: 1px; background: linear-gradient(90deg, #ff8fb1, #ffe08a, #6ef0ff); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 2px; text-align: center; }
  #lang-switch { display: flex; align-self: center; background: rgba(12,8,16,0.72); border: 1px solid rgba(255,255,255,0.12); border-radius: 999px; overflow: hidden; margin-bottom: 4px; box-shadow: 0 8px 24px rgba(0,0,0,0.28); }
  .lang-btn { background: transparent; border: none; color: #dbdee1; padding: 9px 15px; font-size: 13px; font-weight: 800; cursor: pointer; }
  .lang-btn.active { background: linear-gradient(135deg, #ff5e9b, #ffcf66); color: #1a0d12; }
  .social-btn {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.05)); border: 1px solid rgba(255,255,255,0.14); color: #dbdee1;
    text-decoration: none; padding: 13px 14px; border-radius: 14px; font-size: 15px; font-weight: 700; width: 100%;
    transition: transform 0.16s ease, background 0.16s ease, border-color 0.16s ease, box-shadow 0.16s ease;
    box-shadow: 0 8px 24px rgba(0,0,0,0.24);
  }
  .social-btn:hover { transform: translateY(-2px); background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.22); box-shadow: 0 14px 28px rgba(255,94,155,0.18); }
</style>
</head>
<body>

<div id="wrap">
  <div id="brand-tag">SnipeCorp</div>
  <div id="lang-switch">
    <button class="lang-btn active" id="lang-en" data-lang="en">EN</button>
    <button class="lang-btn" id="lang-fr" data-lang="fr">FR</button>
  </div>
  <a class="social-btn" href="https://youtube.com/@snipepro_8" target="_blank" rel="noopener">▶ YouTube</a>
  <a class="social-btn" href="https://instagram.com/3gameur1yt/" target="_blank" rel="noopener">📷 Instagram</a>
  <a class="social-btn" href="https://twitch.tv/3gameur1" target="_blank" rel="noopener">🎥 Twitch</a>
</div>

<script>
  function applyLanguage(lang) {
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.getAttribute('data-lang') === lang));
  }
  document.querySelectorAll('.lang-btn').forEach(b => b.addEventListener('click', () => applyLanguage(b.getAttribute('data-lang'))));
</script>

</body>
</html>
