<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snipepro - Mailbox</title>
<style>
  * { box-sizing: border-box; }
  @keyframes drift { 0%,100% { transform: translate3d(0,0,0) scale(1); } 50% { transform: translate3d(-14px,14px,0) scale(1.04); } }
  html, body { min-height: 100%; margin: 0; font-family: 'gg sans', 'Helvetica Neue', Arial, sans-serif; background: #05050f; color: #dbdee1; display: flex; align-items: center; justify-content: center; }
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
      radial-gradient(circle at 20% 20%, rgba(88,101,242,0.22), transparent 35%),
      radial-gradient(circle at 80% 80%, rgba(51,208,255,0.18), transparent 28%),
    linear-gradient(135deg, rgba(10,14,28,0.92), rgba(5,5,15,0.98));
    z-index: 0;
  }
  body::before, body::after { animation: drift 18s ease-in-out infinite; }
  body::after {
    content: "MAILBOX";
    position: fixed;
    right: -40px;
    bottom: 30px;
    font-size: 14vw;
    font-weight: 900;
    letter-spacing: 0.25em;
    color: rgba(255,255,255,0.03);
    transform: rotate(-12deg);
    z-index: 0;
    pointer-events: none;
  }
  #wrap { position: relative; z-index: 1; width: min(92vw, 360px); display: flex; flex-direction: column; gap: 14px; padding: 22px; }
  #brand-tag { font-size: 22px; font-weight: 900; letter-spacing: 1px; background: linear-gradient(90deg, #b08cff, #5da9ff, #8ff6ff); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 2px; text-align: center; }
  #lang-switch { display: flex; align-self: center; background: rgba(6,8,18,0.72); border: 1px solid rgba(255,255,255,0.12); border-radius: 999px; overflow: hidden; margin-bottom: 4px; box-shadow: 0 8px 24px rgba(0,0,0,0.28); }
  .lang-btn { background: transparent; border: none; color: #dbdee1; padding: 9px 15px; font-size: 13px; font-weight: 800; cursor: pointer; }
  .lang-btn.active { background: linear-gradient(135deg, #5865f2, #33d0ff); color: #fff; }
  .social-btn {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.05)); border: 1px solid rgba(255,255,255,0.14); color: #dbdee1;
    text-decoration: none; padding: 13px 14px; border-radius: 14px; font-size: 15px; font-weight: 700; width: 100%;
    transition: transform 0.16s ease, background 0.16s ease, border-color 0.16s ease, box-shadow 0.16s ease;
    box-shadow: 0 8px 24px rgba(0,0,0,0.24);
  }
  .social-btn:hover { transform: translateY(-2px); background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.22); box-shadow: 0 14px 28px rgba(88,101,242,0.18); }
</style>
</head>
<body>

<div id="wrap">
  <div id="brand-tag">SnipeCorp</div>
  <div id="lang-switch">
    <button class="lang-btn active" id="lang-en" data-lang="en">EN</button>
    <button class="lang-btn" id="lang-fr" data-lang="fr">FR</button>
  </div>
  <a class="social-btn" href="https://snipepro08.github.io/Snipepro08/snipemailbox" target="_blank" rel="noopener">📨 <span data-i18n="mailboxSnipeproLink">Snipepro Mailbox</span></a>
  <a class="social-btn" href="https://snipepro08.github.io/Snipepro08/ptxauth/" target="_blank" rel="noopener">📨 <span data-i18n="mailboxPtxLink">ptx Mailbox</span></a>
</div>

<script>
  const translations = {
    en: { mailboxSnipeproLink: "Snipepro Mailbox", mailboxPtxLink: "ptx Mailbox" },
    fr: { mailboxSnipeproLink: "Messagerie Snipepro", mailboxPtxLink: "Messagerie ptx" }
  };
  function applyLanguage(lang) {
    const t = translations[lang];
    document.querySelectorAll('[data-i18n]').forEach(el => { const k = el.getAttribute('data-i18n'); if (t[k]) el.textContent = t[k]; });
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.getAttribute('data-lang') === lang));
  }
  document.querySelectorAll('.lang-btn').forEach(b => b.addEventListener('click', () => applyLanguage(b.getAttribute('data-lang'))));
</script>

</body>
</html>
