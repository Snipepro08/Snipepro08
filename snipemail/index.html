<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snipecorp Mailbox</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    min-height: 100%;
    margin: 0;
    font-family: 'gg sans', 'Helvetica Neue', Arial, sans-serif;
    background: #05050f;
    color: #dbdee1;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
      radial-gradient(circle at 24% 18%, rgba(88,101,242,0.20), transparent 18%),
      radial-gradient(circle at 78% 24%, rgba(51,208,255,0.18), transparent 20%),
      radial-gradient(circle at 55% 82%, rgba(255,182,73,0.12), transparent 24%),
      linear-gradient(155deg, rgba(8,10,20,0.98), rgba(5,5,15,1));
    z-index: 0;
  }
  body::after {
    content: "INBOX";
    position: fixed;
    left: -14px;
    top: 30px;
    font-size: 14vw;
    font-weight: 900;
    letter-spacing: 0.2em;
    color: rgba(255,255,255,0.03);
    transform: rotate(-90deg);
    transform-origin: left top;
    z-index: 0;
    pointer-events: none;
  }
  #wrap { position: relative; z-index: 1; display: flex; flex-direction: column; gap: 12px; width: 300px; }
  #lang-switch {
    display: flex;
    background: rgba(0,0,0,0.25);
    border: 1px solid rgba(255,255,255,0.16);
    border-radius: 8px;
    overflow: hidden;
    align-self: flex-start;
  }
  .lang-btn {
    background: transparent; border: none; color: #dbdee1;
    padding: 8px 14px; font-size: 13px; font-weight: 700; cursor: pointer;
  }
  .lang-btn.active { background: rgba(0,0,0,0.5); color: #fff; }

  #discord-login-area { margin-bottom: 4px; }
  .login-status {
    font-size: 12px; color: #dbdee1;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.14);
    border-radius: 8px; padding: 10px 12px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .cat-btn {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.14);
    color: #dbdee1; padding: 13px 14px; border-radius: 8px;
    font-size: 15px; font-weight: 600; cursor: pointer; width: 100%;
    transition: transform 0.15s ease, background 0.15s ease;
  }
  .cat-btn:hover { transform: translateY(-2px); background: rgba(255,255,255,0.12); }

  #mailbox-wrap { position: relative; }
  #mailbox-menu {
    display: none; position: absolute; top: calc(100% + 8px); left: 0; right: 0;
    background: #1a1b1e; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5); overflow: hidden; z-index: 10;
  }
  #mailbox-wrap.open #mailbox-menu { display: block; }
  .menu-item {
    display: block; width: 100%; text-align: left; background: none; border: none;
    color: #dbdee1; padding: 12px 14px; font-size: 13px; cursor: pointer;
  }
  .menu-item:hover { background: rgba(88,101,242,0.18); }
  .menu-item + .menu-item { border-top: 1px solid rgba(255,255,255,0.06); }

  .modal-overlay {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.65); justify-content: center; align-items: center; z-index: 1000;
  }
  .modal-overlay.active { display: flex; }
  .modal-box {
    background: #313338; width: 420px; max-width: 90vw; max-height: 85vh;
    border-radius: 8px; overflow: hidden; display: flex; flex-direction: column;
  }
  .modal-header { background: #2b2d31; padding: 20px 24px; text-align: center; }
  .modal-header h2 { margin: 0; color: #fff; font-size: 20px; }
  .modal-header p { margin: 6px 0 0; color: #949ba4; font-size: 13px; }
  .modal-body { padding: 20px 24px; overflow-y: auto; }
  .form-group { margin-bottom: 16px; }
  .form-group label {
    display: block; font-size: 12px; font-weight: 700; text-transform: uppercase;
    color: #b5bac1; margin-bottom: 8px;
  }
  .form-group input, .form-group textarea {
    width: 100%; box-sizing: border-box; background: #1e1f22; border: 1px solid #1e1f22;
    border-radius: 4px; padding: 10px; color: #dbdee1; font-size: 14px; font-family: inherit; resize: vertical;
  }
  .form-group textarea { min-height: 90px; }
  .form-group input:focus, .form-group textarea:focus { outline: none; border-color: #5865f2; }
  .form-note { font-size: 12px; color: #949ba4; margin: 0 0 16px; line-height: 1.5; }
  .sending-as { font-size: 12px; color: #949ba4; margin: -6px 0 16px; }
  .modal-footer { background: #2b2d31; padding: 16px 24px; display: flex; justify-content: flex-end; gap: 12px; }
  .btn-cancel { background: transparent; color: #dbdee1; border: none; padding: 10px 16px; border-radius: 4px; cursor: pointer; font-weight: 500; }
  .btn-submit { background: #5865f2; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: 500; }
  .btn-submit:hover { background: #4752c4; }
  .btn-submit:disabled { background: #4752c4; opacity: 0.6; cursor: not-allowed; }
  .error-msg { color: #f23f42; font-size: 13px; margin-top: 6px; display: none; }
  .status-msg { text-align: center; padding: 20px; font-size: 14px; }
</style>
</head>
<body>

<div id="wrap">
  <div id="lang-switch">
    <button class="lang-btn active" id="lang-en" data-lang="en">EN</button>
    <button class="lang-btn" id="lang-fr" data-lang="fr">FR</button>
  </div>
  <div id="discord-login-area"></div>
  <div id="mailbox-wrap">
    <button class="cat-btn" id="mailbox-btn">📬 <span id="mailbox-btn-label">Snipecorp Mailbox</span> ▾</button>
    <div id="mailbox-menu"></div>
  </div>
</div>

<!-- Generic mailbox modal -->
<div class="modal-overlay" id="mailbox-overlay">
  <div class="modal-box">
    <div class="modal-header">
      <h2 id="mailbox-modal-title">Mailbox</h2>
      <p id="mailbox-modal-subtitle"></p>
    </div>
    <div class="modal-body" id="mailbox-modal-body"></div>
    <div class="modal-footer" id="mailbox-modal-footer">
      <button class="btn-cancel" id="mailbox-cancel-btn">Cancel</button>
      <button class="btn-submit" id="mailbox-submit-btn">Send</button>
    </div>
  </div>
</div>

<script>
  // ⚠️ Webhook used by every Snipecorp Mailbox option
  const WEBHOOK_URL = "https://discord.com/api/webhooks/1526567795578372257/T0r-r67nrO_ptOMpy1twDr_HtCiNEsmEs_ThRJpsFDtLMQczy2UZJrYZq-0M7tta7ZO9";

  // ---- Discord OAuth2 (implicit grant — no client secret needed) ----
  const DISCORD_CLIENT_ID = "1526891762436538460";
  const DISCORD_REDIRECT_URI = "https://snipepro08.github.io/Snipepro08/callback";
  const DISCORD_AUTH_URL = "https://discord.com/oauth2/authorize"
    + "?client_id=" + DISCORD_CLIENT_ID
    + "&redirect_uri=" + encodeURIComponent(DISCORD_REDIRECT_URI)
    + "&response_type=token&scope=identify";

  let discordUser = null;
  let pendingMailboxId = null;

  function encodeState(obj) {
    return btoa(unescape(encodeURIComponent(JSON.stringify(obj))));
  }
  function decodeState(str) {
    return JSON.parse(decodeURIComponent(escape(atob(str))));
  }

  const translations = {
    en: {
      loginBtn: "Connect with Discord", connectedAs: "Connected as", logoutBtn: "Log out", sendingAs: "Sending as",
      btnCancel: "Cancel", btnSend: "Send", btnSending: "Sending...",
      errFillAll: "Please fill in every field.", errSend: "Failed to send. Please check the webhook URL.", successMsg: "✅ Sent successfully!",
      dmNote: "Reminder: your Discord DMs must be open so the SnipeCorp team can reach you.",
      mailboxCollab: "Request a collab with Snipepro", collabModalTitle: "Collab Request", collabModalSubtitle: "Submit your professional request below",
      labelMessage: "Message", placeholderMessage: "Describe your request...",
      mailboxWebhook: "Propose your Discord webhook", webhookModalTitle: "Propose your webhook", webhookModalSubtitle: "Submit your server's webhook below",
      labelWebhookUrl: "Webhook URL", placeholderWebhookUrl: "https://discord.com/api/webhooks/...",
      mailboxRoblox: "Apply to add your Roblox game to City Of Fun", robloxModalTitle: "Roblox Game Submission", robloxModalSubtitle: "Apply to get your game added to City Of Fun",
      labelGameLink: "Roblox game link", placeholderGameLink: "https://www.roblox.com/games/...",
      labelGameDescription: "Describe your game", placeholderGameDescription: "What makes it a good fit?",
      mailboxServerAdd: "Add your Discord server to the random pool", serverAddModalTitle: "Add Your Server", serverAddModalSubtitle: "Submit your server for the random server pool",
      labelServerInfo: "Server ID or invite link", placeholderServerInfo: "123456789012345678 or discord.gg/...",
      serverAddNote: "Make sure your server's widget is enabled beforehand. Submissions are reviewed by staff before being published.",
      mailboxReport: "Report a user", reportModalTitle: "Report a User", reportModalSubtitle: "For example: identity theft / impersonation",
      labelReportedUser: "User being reported", placeholderReportedUser: "Username or user ID",
      labelReportReason: "Reason / details", placeholderReportReason: "Explain the situation..."
    },
    fr: {
      loginBtn: "Se connecter avec Discord", connectedAs: "Connecté en tant que", logoutBtn: "Se déconnecter", sendingAs: "Envoi en tant que",
      btnCancel: "Annuler", btnSend: "Envoyer", btnSending: "Envoi...",
      errFillAll: "Merci de remplir tous les champs.", errSend: "Échec de l'envoi. Vérifie l'URL du webhook.", successMsg: "✅ Envoyé avec succès !",
      dmNote: "Rappel : tes MP Discord doivent être ouverts pour que l'équipe SnipeCorp puisse te contacter.",
      mailboxCollab: "Demander une collab avec Snipepro", collabModalTitle: "Demande de collab", collabModalSubtitle: "Soumets ta demande professionnelle ci-dessous",
      labelMessage: "Message", placeholderMessage: "Décris ta demande...",
      mailboxWebhook: "Proposer son webhook Discord", webhookModalTitle: "Proposer ton webhook", webhookModalSubtitle: "Soumets le webhook de ton serveur ci-dessous",
      labelWebhookUrl: "URL du webhook", placeholderWebhookUrl: "https://discord.com/api/webhooks/...",
      mailboxRoblox: "Postuler pour ajouter son jeu Roblox à City Of Fun", robloxModalTitle: "Candidature jeu Roblox", robloxModalSubtitle: "Postule pour ajouter ton jeu à City Of Fun",
      labelGameLink: "Lien du jeu Roblox", placeholderGameLink: "https://www.roblox.com/games/...",
      labelGameDescription: "Décris ton jeu", placeholderGameDescription: "Qu'est-ce qui en fait un bon choix ?",
      mailboxServerAdd: "Ajouter son serveur Discord aux serveurs aléatoires", serverAddModalTitle: "Ajouter ton serveur", serverAddModalSubtitle: "Soumets ton serveur pour le tirage aléatoire",
      labelServerInfo: "ID du serveur ou lien d'invitation", placeholderServerInfo: "123456789012345678 ou discord.gg/...",
      serverAddNote: "Assure-toi d'avoir activé le widget de ton serveur au préalable. Les soumissions sont examinées par le staff avant publication.",
      mailboxReport: "Signaler un utilisateur", reportModalTitle: "Signaler un utilisateur", reportModalSubtitle: "Par exemple : usurpation d'identité",
      labelReportedUser: "Utilisateur signalé", placeholderReportedUser: "Pseudo ou ID utilisateur",
      labelReportReason: "Raison / détails", placeholderReportReason: "Explique la situation..."
    }
  };
  let currentLang = "en";

  const MAILBOX_OPTIONS = [
    { id: 'collab', menuKey: 'mailboxCollab', titleKey: 'collabModalTitle', subtitleKey: 'collabModalSubtitle',
      fields: [{ id: 'message', labelKey: 'labelMessage', placeholderKey: 'placeholderMessage', type: 'textarea' }],
      buildContent: (v) => `📩 **${discordUser.username}** requested a collab:\n${v.message}` },
    { id: 'webhook', menuKey: 'mailboxWebhook', titleKey: 'webhookModalTitle', subtitleKey: 'webhookModalSubtitle',
      fields: [{ id: 'webhookUrl', labelKey: 'labelWebhookUrl', placeholderKey: 'placeholderWebhookUrl', type: 'text' }],
      buildContent: (v) => `🔗 **${discordUser.username}** proposed their webhook: ${v.webhookUrl}` },
    { id: 'roblox', menuKey: 'mailboxRoblox', titleKey: 'robloxModalTitle', subtitleKey: 'robloxModalSubtitle',
      fields: [
        { id: 'gameLink', labelKey: 'labelGameLink', placeholderKey: 'placeholderGameLink', type: 'text' },
        { id: 'message', labelKey: 'labelGameDescription', placeholderKey: 'placeholderGameDescription', type: 'textarea' }
      ],
      buildContent: (v) => `🎮 **${discordUser.username}** submitted a Roblox game for City Of Fun\nLink: ${v.gameLink}\n${v.message}` },
    { id: 'serverAdd', menuKey: 'mailboxServerAdd', titleKey: 'serverAddModalTitle', subtitleKey: 'serverAddModalSubtitle', noteKey: 'serverAddNote',
      fields: [{ id: 'serverInfo', labelKey: 'labelServerInfo', placeholderKey: 'placeholderServerInfo', type: 'text' }],
      buildContent: (v) => `➕ **${discordUser.username}** submitted a server for the random pool: ${v.serverInfo}\n(Pending staff review)` },
    { id: 'report', menuKey: 'mailboxReport', titleKey: 'reportModalTitle', subtitleKey: 'reportModalSubtitle',
      fields: [
        { id: 'reportedUser', labelKey: 'labelReportedUser', placeholderKey: 'placeholderReportedUser', type: 'text' },
        { id: 'reason', labelKey: 'labelReportReason', placeholderKey: 'placeholderReportReason', type: 'textarea' }
      ],
      buildContent: (v) => `🚨 **${discordUser.username}** reported a user: ${v.reportedUser}\nReason: ${v.reason}` }
  ];

  function renderMailboxMenu() {
    const t = translations[currentLang];
    const menu = document.getElementById('mailbox-menu');
    menu.innerHTML = '';
    MAILBOX_OPTIONS.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'menu-item';
      btn.textContent = t[opt.menuKey];
      btn.addEventListener('click', () => openMailboxModal(opt.id));
      menu.appendChild(btn);
    });
  }

  function renderLoginUI() {
    const t = translations[currentLang];
    const area = document.getElementById('discord-login-area');
    if (discordUser) {
      area.innerHTML = `<div class="login-status">
        ✅ ${t.connectedAs} <strong>${discordUser.username}</strong>
        <button class="menu-item" id="logout-btn" style="border:1px solid rgba(255,255,255,0.15);border-radius:6px;">${t.logoutBtn}</button>
      </div>`;
      document.getElementById('logout-btn').addEventListener('click', () => { discordUser = null; renderLoginUI(); });
    } else {
      area.innerHTML = `<button class="cat-btn" id="discord-login-btn">🔐 ${t.loginBtn}</button>`;
      document.getElementById('discord-login-btn').addEventListener('click', () => { window.location.href = DISCORD_AUTH_URL; });
    }
  }

  function applyLanguage(lang) {
    currentLang = lang;
    document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.toggle('active', btn.getAttribute('data-lang') === lang));
    renderMailboxMenu();
    renderLoginUI();
  }
  document.querySelectorAll('.lang-btn').forEach(btn => btn.addEventListener('click', () => applyLanguage(btn.getAttribute('data-lang'))));

  function startDiscordLogin(stateObj) {
    const state = encodeState(stateObj);
    window.location.href = DISCORD_AUTH_URL + '&state=' + encodeURIComponent(state);
  }

  function requireLogin() {
    if (discordUser) return true;
    startDiscordLogin({ returnTo: 'snipemail' });
    return false;
  }

  const mailboxWrap = document.getElementById('mailbox-wrap');
  const mailboxBtn = document.getElementById('mailbox-btn');
  mailboxBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    if (!requireLogin()) return;
    mailboxWrap.classList.toggle('open');
  });
  document.addEventListener('click', () => mailboxWrap.classList.remove('open'));

  const mailboxOverlay = document.getElementById('mailbox-overlay');
  const mailboxTitleEl = document.getElementById('mailbox-modal-title');
  const mailboxSubtitleEl = document.getElementById('mailbox-modal-subtitle');
  const mailboxBodyEl = document.getElementById('mailbox-modal-body');
  const mailboxFooterEl = document.getElementById('mailbox-modal-footer');
  const mailboxCancelBtn = document.getElementById('mailbox-cancel-btn');
  const mailboxSubmitBtn = document.getElementById('mailbox-submit-btn');
  let currentMailboxOption = null;

  function fieldHTML(f, t) {
    const label = t[f.labelKey], placeholder = t[f.placeholderKey];
    if (f.type === 'textarea') return `<div class="form-group"><label>${label}</label><textarea id="mb-${f.id}" placeholder="${placeholder}"></textarea></div>`;
    return `<div class="form-group"><label>${label}</label><input type="text" id="mb-${f.id}" placeholder="${placeholder}"></div>`;
  }

  function renderMailboxModal() {
    const t = translations[currentLang];
    const opt = currentMailboxOption;
    mailboxTitleEl.textContent = t[opt.titleKey];
    mailboxSubtitleEl.textContent = t[opt.subtitleKey];
    let html = `<p class="sending-as">${t.sendingAs}: <strong>${discordUser.username}</strong></p>`;
    html += opt.fields.map(f => fieldHTML(f, t)).join('');
    if (opt.noteKey) html += `<p class="form-note">${t[opt.noteKey]}</p>`;
    html += `<p class="form-note">${t.dmNote}</p><div class="error-msg" id="mailbox-error-msg"></div>`;
    mailboxBodyEl.innerHTML = html;
    mailboxFooterEl.style.display = 'flex';
    mailboxSubmitBtn.disabled = false;
    mailboxSubmitBtn.textContent = t.btnSend;
  }

  function openMailboxModal(optionId) {
    currentMailboxOption = MAILBOX_OPTIONS.find(o => o.id === optionId);
    if (!discordUser) {
      pendingMailboxId = optionId;
      startDiscordLogin({ returnTo: 'snipemail', mailboxId: optionId });
      return;
    }
    mailboxWrap.classList.remove('open');
    renderMailboxModal();
    mailboxOverlay.classList.add('active');
  }
  function closeMailboxModal() { mailboxOverlay.classList.remove('active'); }
  mailboxCancelBtn.addEventListener('click', closeMailboxModal);
  mailboxOverlay.addEventListener('click', (e) => { if (e.target === mailboxOverlay) closeMailboxModal(); });

  mailboxSubmitBtn.addEventListener('click', async () => {
    const t = translations[currentLang];
    const opt = currentMailboxOption;
    const values = {};
    let hasEmpty = false;
    opt.fields.forEach(f => {
      const el = document.getElementById('mb-' + f.id);
      const val = el.value.trim();
      if (!val) hasEmpty = true;
      values[f.id] = val;
    });
    const errorMsg = document.getElementById('mailbox-error-msg');
    if (hasEmpty) { errorMsg.textContent = t.errFillAll; errorMsg.style.display = 'block'; return; }

    mailboxSubmitBtn.disabled = true;
    mailboxSubmitBtn.textContent = t.btnSending;

    try {
      const response = await fetch(WEBHOOK_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ content: opt.buildContent(values) })
      });
      if (!response.ok) throw new Error("Failed to send (" + response.status + ")");
      mailboxBodyEl.innerHTML = `<div class="status-msg">${t.successMsg}</div>`;
      mailboxFooterEl.style.display = 'none';
      setTimeout(() => { closeMailboxModal(); }, 1500);
    } catch (err) {
      errorMsg.textContent = t.errSend;
      errorMsg.style.display = 'block';
      mailboxSubmitBtn.disabled = false;
      mailboxSubmitBtn.textContent = t.btnSend;
    }
  });

  // ---- Handle returning from the Discord OAuth callback ----
  function handleDiscordRedirect() {
    if (!window.location.hash.startsWith('#discord_token=')) return;
    const params = new URLSearchParams(window.location.hash.substring(1));
    const token = params.get('discord_token');
    const pendingState = params.get('pending');
    history.replaceState(null, '', window.location.pathname);
    fetch('https://discord.com/api/users/@me', { headers: { Authorization: 'Bearer ' + token } })
      .then(res => res.json())
      .then(data => {
        discordUser = { id: data.id, username: data.global_name || data.username };
        renderLoginUI();
        if (pendingState) {
          const pending = decodeState(pendingState);
          if (pending.mailboxId) {
            pendingMailboxId = pending.mailboxId;
            openMailboxModal(pending.mailboxId);
          } else {
            mailboxWrap.classList.add('open');
          }
        }
      })
      .catch(() => {});
  }

  applyLanguage(currentLang);
  handleDiscordRedirect();
</script>

</body>
</html>
