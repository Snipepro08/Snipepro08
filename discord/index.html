<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snipepro - Discord</title>
<style>
  * { box-sizing: border-box; }
  html, body { min-height: 100%; margin: 0; font-family: 'gg sans', 'Helvetica Neue', Arial, sans-serif; background: #05050f; color: #dbdee1; display: flex; align-items: center; justify-content: center; }
  @keyframes drift { 0%,100% { transform: translate3d(0,0,0) scale(1); } 50% { transform: translate3d(18px,-18px,0) scale(1.04); } }
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
      radial-gradient(circle at 22% 20%, rgba(88,101,242,0.24), transparent 18%),
      radial-gradient(circle at 80% 24%, rgba(51,208,255,0.18), transparent 20%),
      radial-gradient(circle at 50% 80%, rgba(153,102,255,0.14), transparent 22%),
    linear-gradient(150deg, rgba(10,12,24,0.98), rgba(5,5,15,1));
    z-index: 0;
  }
  body::before, body::after { animation: drift 16s ease-in-out infinite; }
  body::after {
    content: "DISCORD";
    position: fixed;
    left: 18px;
    bottom: 18px;
    font-size: 12vw;
    font-weight: 900;
    letter-spacing: 0.22em;
    color: rgba(255,255,255,0.03);
    z-index: 0;
    pointer-events: none;
  }
  #wrap { position: relative; z-index: 1; width: min(92vw, 360px); display: flex; flex-direction: column; gap: 14px; padding: 22px; }
  #brand-tag { font-size: 22px; font-weight: 900; letter-spacing: 1px; background: linear-gradient(90deg, #a77cff, #5865f2, #33d0ff); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 2px; text-align: center; }
  #lang-switch { display: flex; align-self: center; background: rgba(4,8,18,0.74); border: 1px solid rgba(255,255,255,0.12); border-radius: 999px; overflow: hidden; margin-bottom: 4px; box-shadow: 0 8px 24px rgba(0,0,0,0.28); }
  .lang-btn { background: transparent; border: none; color: #dbdee1; padding: 9px 15px; font-size: 13px; font-weight: 800; cursor: pointer; }
  .lang-btn.active { background: linear-gradient(135deg, #5865f2, #33d0ff); color: #fff; }
  .social-btn {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.05)); border: 1px solid rgba(255,255,255,0.14); color: #dbdee1;
    text-decoration: none; padding: 13px 14px; border-radius: 14px; font-size: 15px; font-weight: 700; width: 100%; cursor: pointer;
    transition: transform 0.16s ease, background 0.16s ease, border-color 0.16s ease, box-shadow 0.16s ease;
    box-shadow: 0 8px 24px rgba(0,0,0,0.24);
  }
  .social-btn:hover { transform: translateY(-2px); background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.22); box-shadow: 0 14px 28px rgba(88,101,242,0.18); }

  .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(2,4,10,0.72); backdrop-filter: blur(8px); justify-content: center; align-items: center; z-index: 1000; padding: 18px; }
  .modal-overlay.active { display: flex; }
  .widget-modal-box { background: rgba(18,20,32,0.88); border: 1px solid rgba(255,255,255,0.08); padding: 12px; border-radius: 18px; box-shadow: 0 28px 60px rgba(0,0,0,0.45); }
  .widget-modal-box iframe { border-radius: 8px; display: block; }
  .widget-close-btn { display: block; margin: 0 auto 10px; background: linear-gradient(135deg, #5865f2, #33d0ff); border: none; color: #fff; padding: 9px 16px; border-radius: 999px; cursor: pointer; font-size: 13px; font-weight: 800; }
</style>
</head>
<body>

<div id="wrap">
  <div id="brand-tag">SnipeCorp</div>
  <div id="lang-switch">
    <button class="lang-btn active" id="lang-en" data-lang="en">EN</button>
    <button class="lang-btn" id="lang-fr" data-lang="fr">FR</button>
  </div>
  <a class="social-btn" href="https://discord.com/users/1415766547321847930" target="_blank" rel="noopener" data-i18n="discordViewProfile">View Snipepro's profile</a>
  <a class="social-btn" href="https://discord.com/oauth2/authorize?client_id=1517116269004984320&integration_type=1&scope=applications.commands" target="_blank" rel="noopener" data-i18n="discordAddBot">Add the official Snipepro bot</a>
  <button class="social-btn" id="discord-servers-btn">🎲 <span data-i18n="serversLabel">Get a random serv</span></button>
</div>

<div class="modal-overlay" id="widget-overlay">
  <div class="widget-modal-box" id="widget-box"></div>
</div>

<script>
  const translations = {
    en: { discordViewProfile: "View Snipepro's profile", discordAddBot: "Add the official Snipepro bot", serversLabel: "Get a random serv", widgetClose: "Close" },
    fr: { discordViewProfile: "Voir le profil de Snipepro", discordAddBot: "Ajouter le bot officiel de Snipepro", serversLabel: "Serv Discord au hasard", widgetClose: "Fermer" }
  };
  let currentLang = "en";
  function applyLanguage(lang) {
    currentLang = lang;
    const t = translations[lang];
    document.querySelectorAll('[data-i18n]').forEach(el => { const k = el.getAttribute('data-i18n'); if (t[k]) el.textContent = t[k]; });
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.getAttribute('data-lang') === lang));
  }
  document.querySelectorAll('.lang-btn').forEach(b => b.addEventListener('click', () => applyLanguage(b.getAttribute('data-lang'))));

  const DISCORD_SERVERS = [
    { name: "Server 1", id: "1421178923034869975" },
    { name: "Server 2", id: "1389895023570714727" },
    { name: "Server 3", id: "1518314264165617855" },
    { name: "Server 4", id: "1501860935151910942" },
    { name: "Server 5", id: "1518527780353085540" }
  ];
  const widgetOverlay = document.getElementById('widget-overlay');
  const widgetBox = document.getElementById('widget-box');
  document.getElementById('discord-servers-btn').addEventListener('click', () => {
    const server = DISCORD_SERVERS[Math.floor(Math.random() * DISCORD_SERVERS.length)];
    const t = translations[currentLang];
    widgetBox.innerHTML = `
      <button class="widget-close-btn" id="widget-close-btn">${t.widgetClose} ✕</button>
      <iframe src="https://discord.com/widget?id=${server.id}&theme=dark" width="350" height="500" allowtransparency="true" frameborder="0"
        sandbox="allow-popups allow-popups-to-escape-sandbox allow-same-origin allow-scripts"></iframe>`;
    document.getElementById('widget-close-btn').addEventListener('click', () => { widgetOverlay.classList.remove('active'); widgetBox.innerHTML = ''; });
    widgetOverlay.classList.add('active');
  });
  widgetOverlay.addEventListener('click', (e) => { if (e.target === widgetOverlay) { widgetOverlay.classList.remove('active'); widgetBox.innerHTML = ''; } });

  applyLanguage(currentLang);
</script>

</body>
</html>
