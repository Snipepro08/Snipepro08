<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Use ptx2's Mailbox</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'gg sans','Segoe UI',Arial,sans-serif;
}

body{
    background:#05050f;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    overflow:hidden;
}

/* Animated background */

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:linear-gradient(
        135deg,
        #1b1035,
        #3a1c71,
        #5865f2,
        #33d0ff,
        #1b1035
    );
    background-size:400% 400%;
    animation:bgMove 18s ease infinite;
    z-index:-2;
}

@keyframes bgMove{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}

/* Main button */

#mailboxBtn{

background:linear-gradient(
135deg,
#6f5bff,
#5865f2,
#33d0ff
);

border:none;

color:white;

font-size:17px;

font-weight:700;

padding:16px 24px;

border-radius:12px;

cursor:pointer;

transition:.2s;

box-shadow:
0 0 25px rgba(88,101,242,.35);

}

#mailboxBtn:hover{

transform:translateY(-3px);

box-shadow:
0 0 40px rgba(88,101,242,.6);

}

#mailboxBtn:active{

transform:scale(.96);

}

/* Overlay */

.overlay{

display:none;

position:fixed;

left:0;
top:0;

width:100%;
height:100%;

background:rgba(0,0,0,.65);

backdrop-filter:blur(3px);

justify-content:center;

align-items:center;

z-index:999;

}

/* Popup */

.popup{

width:440px;

max-width:92vw;

background:#313338;

border-radius:12px;

overflow:hidden;

animation:popup .25s ease;

box-shadow:
0 10px 30px rgba(0,0,0,.5);

}

@keyframes popup{

from{

opacity:0;

transform:scale(.92);

}

to{

opacity:1;

transform:scale(1);

}

}

.popup-header{

background:#2b2d31;

padding:20px;

text-align:center;

}

.popup-header h2{

font-size:22px;

}

.popup-body{

padding:20px;

}

.popup-footer{

background:#2b2d31;

padding:15px;

display:flex;

justify-content:flex-end;

gap:10px;

}

/* Form */

label{

display:block;

margin-bottom:8px;

font-size:13px;

font-weight:bold;

color:#b5bac1;

}

textarea{

width:100%;

height:140px;

resize:none;

background:#1e1f22;

border:1px solid #1e1f22;

border-radius:6px;

padding:12px;

color:white;

font-size:14px;

outline:none;

transition:.2s;

}

textarea:focus{

border-color:#5865f2;

box-shadow:
0 0 0 3px rgba(88,101,242,.25);

}

/* Buttons */

.cancelBtn{

background:transparent;

border:none;

color:white;

cursor:pointer;

padding:10px 18px;

font-size:15px;

}

.cancelBtn:hover{

text-decoration:underline;

}

.sendBtn{

background:#5865f2;

border:none;

color:white;

padding:10px 18px;

border-radius:6px;

cursor:pointer;

font-weight:bold;

}

.sendBtn:hover{

background:#4752c4;

}

.sendBtn:disabled{

opacity:.6;

cursor:not-allowed;

}

/* Status */

.status{

margin-top:14px;

font-size:14px;

text-align:center;

display:none;

}

.success{

color:#39d353;

}

.error{

color:#ff5d5d;

}

/* Login */

#loginArea{

position:fixed;

top:20px;

right:20px;

display:flex;

flex-direction:column;

gap:10px;

align-items:flex-end;

}

.loginButton{

background:#5865F2;

border:none;

color:white;

padding:12px 18px;

border-radius:8px;

cursor:pointer;

font-weight:bold;

}

.loginButton:hover{

background:#4752c4;

}

.userBox{

background:rgba(255,255,255,.08);

padding:12px;

border-radius:8px;

font-size:14px;

backdrop-filter:blur(5px);

}

.logoutBtn{

margin-top:10px;

background:#ff5555;

border:none;

padding:8px 12px;

color:white;

border-radius:6px;

cursor:pointer;

}

.logoutBtn:hover{

background:#dd4444;

}

</style>

</head>

<body>

<div id="loginArea"></div>

<button id="mailboxBtn">
📨 Use ptx2's Mailbox
</button>

<div class="overlay" id="overlay">

<div class="popup">

<div class="popup-header">

<h2>ptx2's Mailbox</h2>

</div>

<div class="popup-body">

<p id="sendingAs"></p>

<br>

<label>Message</label>

<textarea
id="message"
placeholder="Write your message..."></textarea>

<div
id="status"
class="status"></div>

</div>

<div class="popup-footer">

<button
class="cancelBtn"
id="cancelBtn">

Cancel

</button>

<button
class="sendBtn"
id="sendBtn">

Send

</button>

</div>

</div>

</div>
