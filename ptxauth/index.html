<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ptx2's Mailbox</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    min-height: 100%;
    margin: 0;
    font-family: 'gg sans', 'Helvetica Neue', Arial, sans-serif;
    background: #05050f;
    color: #dbdee1;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #wrap {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 280px;
  }
  #discord-login-area {
    margin-bottom: 4px;
  }
  .login-status {
    font-size: 12px;
    color: #dbdee1;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 8px;
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .cat-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.14);
    color: #dbdee1;
    padding: 12px 14px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    transition: transform 0.15s ease, background 0.15s ease, border-color 0.15s ease;
  }
  .cat-btn:hover {
    transform: translateY(-2px);
    background: rgba(255,255,255,0.12);
    border-color: rgba(255,255,255,0.3);
  }
  .menu-item {
    padding: 10px 14px;
  }

  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(2px);
    justify-content: center;
    align-items: center;
    z-index: 1000;
  }
  .modal-overlay.active { display: flex; }
  .modal-box {
    background: #313338;
    width: 400px;
    max-width: 90vw;
    border-radius: 8px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    overflow: hidden;
  }
  .modal-header {
    background: #2b2d31;
    padding: 20px 24px;
    text-align: center;
  }
  .modal-header h2 { margin: 0; color: #fff; font-size: 20px; }
  .modal-body { padding: 20px 24px; }
  .form-group { margin-bottom: 16px; }
  .form-group label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    color: #b5bac1;
    margin-bottom: 8px;
  }
  .form-group textarea {
    width: 100%;
    box-sizing: border-box;
    background: #1e1f22;
    border: 1px solid #1e1f22;
    border-radius: 4px;
    padding: 10px;
    color: #dbdee1;
    font-size: 14px;
    font-family: inherit;
    min-height: 90px;
    resize: vertical;
  }
  .form-group textarea:focus { outline: none; border-color: #5865f2; }
  .form-note { font-size: 12px; color: #949ba4; margin: 0 0 16px; line-height: 1.5; }
  .sending-as { font-size: 12px; color: #949ba4; margin: -6px 0 16px; }
  .modal-footer {
    background: #2b2d31;
    padding: 16px 24px;
    display: flex;
    justify-content: flex-end;
    gap: 12px;
  }
  .btn-cancel {
    background: transparent; color: #dbdee1; border: none;
    padding: 10px 16px; border-radius: 4px; cursor: pointer; font-weight: 500;
  }
  .btn-cancel:hover { text-decoration: underline; }
  .btn-submit {
    background: #5865f2; color: white; border: none;
    padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: 500;
  }
  .btn-submit:hover { background: #4752c4; }
  .btn-submit:disabled { background: #4752c4; opacity: 0.6; cursor: not-allowed; }
  .error-msg { color: #f23f42; font-size: 13px; margin-top: 6px; display: none; }
  .status-msg { text-align: center; padding: 20px; font-size: 14px; }
</style>
</head>
<body>

<div id="wrap">
  <div id="discord-login-area"></div>
  <button class="cat-btn" id="mailbox-direct-btn">📨 ptx2's mailbox</button>
</div>

<!-- ptx2's mailbox modal -->
<div class="modal-overlay" id="direct-overlay">
  <div class="modal-box">
    <div class="modal-header"><h2>ptx2's Mailbox</h2></div>
    <div class="modal-body" id="direct-modal-body"></div>
    <div class="modal-footer" id="direct-modal-footer">
      <button class="btn-cancel" id="direct-cancel-btn">Cancel</button>
      <button class="btn-submit" id="direct-submit-btn">Send</button>
    </div>
  </div>
</div>

<script>
  // ⚠️ Webhook used by ptx2's mailbox
  const WEBHOOK_URL_2 = "https://discord.com/api/webhooks/1526869294565294163/pJYYMi0ystp5pG5LVlVaNYXP5v_chNzWs8IHVQhPIEXCiDyH-knrV--CHGlLsT7_CXzs";

  // ---- Discord OAuth2 (implicit grant — no client secret needed) ----
  const DISCORD_CLIENT_ID = "1526891762436538460";
  const DISCORD_REDIRECT_URI = "https://snipepro08.github.io/Snipepro08/callback";
  const DISCORD_AUTH_URL = "https://discord.com/oauth2/authorize"
    + "?client_id=" + DISCORD_CLIENT_ID
    + "&redirect_uri=" + encodeURIComponent(DISCORD_REDIRECT_URI)
    + "&response_type=token&scope=identify";

  let discordUser = null;

  function renderLoginUI() {
    const area = document.getElementById('discord-login-area');
    if (discordUser) {
      area.innerHTML = `<div class="login-status">
        ✅ Connected as <strong>${discordUser.username}</strong>
        <button class="cat-btn" id="logout-btn">Log out</button>
      </div>`;
      document.getElementById('logout-btn').addEventListener('click', () => {
        discordUser = null;
        renderLoginUI();
      });
    } else {
      area.innerHTML = `<button class="cat-btn" id="discord-login-btn">🔐 Connect with Discord</button>`;
      document.getElementById('discord-login-btn').addEventListener('click', () => {
        window.location.href = DISCORD_AUTH_URL;
      });
    }
  }

  function encodeState(obj) {
    return btoa(unescape(encodeURIComponent(JSON.stringify(obj))));
  }
  function decodeState(str) {
    return JSON.parse(decodeURIComponent(escape(atob(str))));
  }

  // ---- ptx2's mailbox modal ----
  const directOverlay = document.getElementById('direct-overlay');
  const directBodyEl = document.getElementById('direct-modal-body');
  const directFooterEl = document.getElementById('direct-modal-footer');
  const directCancelBtn = document.getElementById('direct-cancel-btn');
  const directSubmitBtn = document.getElementById('direct-submit-btn');
  const directBtn = document.getElementById('mailbox-direct-btn');

  function renderDirectModal(prefillMessage) {
    directBodyEl.innerHTML = `
      ${discordUser ? `<p class="sending-as">Sending as: <strong>${discordUser.username}</strong></p>` : ''}
      <div class="form-group">
        <label>Message</label>
        <textarea id="direct-message" placeholder="Describe your request...">${prefillMessage || ''}</textarea>
      </div>
      <p class="form-note">Reminder: your Discord DMs must be open so the SnipeCorp team can reach you.</p>
      <div class="error-msg" id="direct-error-msg"></div>`;
    directFooterEl.style.display = 'flex';
    directSubmitBtn.disabled = false;
    directSubmitBtn.textContent = 'Send';
  }

  directBtn.addEventListener('click', () => {
    renderDirectModal();
    directOverlay.classList.add('active');
  });
  directCancelBtn.addEventListener('click', () => directOverlay.classList.remove('active'));
  directOverlay.addEventListener('click', (e) => { if (e.target === directOverlay) directOverlay.classList.remove('active'); });

  async function sendDirectMessage(message) {
    directFooterEl.style.display = 'flex';
    directSubmitBtn.disabled = true;
    directSubmitBtn.textContent = 'Sending...';
    try {
      const response = await fetch(WEBHOOK_URL_2, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ content: `**${discordUser.username}**: ${message}` })
      });
      if (!response.ok) throw new Error("Failed to send (" + response.status + ")");

      directBodyEl.innerHTML = `<div class="status-msg">✅ Sent thanks to SnipeCorp's services!</div>`;
      directFooterEl.style.display = 'none';
      setTimeout(() => { directOverlay.classList.remove('active'); }, 1500);
    } catch (err) {
      const errorMsg = document.getElementById('direct-error-msg');
      if (errorMsg) { errorMsg.textContent = "Failed to send. Please check the webhook URL."; errorMsg.style.display = 'block'; }
      directSubmitBtn.disabled = false;
      directSubmitBtn.textContent = 'Send';
    }
  }

  directSubmitBtn.addEventListener('click', () => {
    const messageEl = document.getElementById('direct-message');
    const errorMsg = document.getElementById('direct-error-msg');
    const message = messageEl.value.trim();

    if (!message) {
      errorMsg.textContent = "Please fill in the message.";
      errorMsg.style.display = 'block';
      return;
    }

    if (discordUser) {
      sendDirectMessage(message);
    } else {
      // Message is ready — now go connect to Discord, then send automatically on return.
      const state = encodeState({ message });
      window.location.href = DISCORD_AUTH_URL + '&state=' + encodeURIComponent(state);
    }
  });

  // ---- Handle returning from the Discord OAuth callback ----
  function handleDiscordRedirect() {
    if (!window.location.hash.startsWith('#discord_token=')) return;
    const params = new URLSearchParams(window.location.hash.substring(1));
    const token = params.get('discord_token');
    const pendingState = params.get('pending');
    history.replaceState(null, '', window.location.pathname);

    fetch('https://discord.com/api/users/@me', {
      headers: { Authorization: 'Bearer ' + token }
    })
      .then(res => res.json())
      .then(data => {
        discordUser = { id: data.id, username: data.global_name || data.username };
        renderLoginUI();
        if (pendingState) {
          const { message } = decodeState(pendingState);
          renderDirectModal(message);
          directOverlay.classList.add('active');
          sendDirectMessage(message);
        }
      })
      .catch(() => { /* silently ignore — user can just try connecting again */ });
  }

  renderLoginUI();
  handleDiscordRedirect();
</script>

</body>
</html>
