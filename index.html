<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snipepro - Contact</title>
<style>
  * {
    box-sizing: border-box;
  }
  html, body {
    min-height: 100%;
    margin: 0;
    font-family: 'gg sans', 'Helvetica Neue', Arial, sans-serif;
  }
  body {
    background: #05050f;
    color: #dbdee1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    position: relative;
    min-height: 100vh;
    padding: 100px 20px 60px;
  }

  /* Animated warp-zoom space background */
  #galaxy-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    background: radial-gradient(ellipse at center, #10102a 0%, #05050f 70%);
  }

  /* SnipeCorp brand text, top right */
  #brand-tag {
    position: fixed;
    top: 20px;
    right: 28px;
    z-index: 2;
    font-size: 20px;
    font-weight: 800;
    letter-spacing: 1px;
    background: linear-gradient(90deg, #8f6fff, #5865f2, #33d0ff);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 0 0 20px rgba(88, 101, 242, 0.4);
    user-select: none;
  }

  /* Language switcher, top left */
  #lang-switch {
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 3;
    display: flex;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    overflow: hidden;
    backdrop-filter: blur(6px);
  }
  .lang-btn {
    background: transparent;
    border: none;
    color: #949ba4;
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s ease, color 0.15s ease;
  }
  .lang-btn.active {
    background: linear-gradient(135deg, #6f5bff, #5865f2);
    color: #fff;
  }
  .lang-btn:not(.active):hover {
    background: rgba(255,255,255,0.08);
    color: #dbdee1;
  }

  /* Main call-to-action button */
  #open-modal-btn {
    position: relative;
    z-index: 2;
    background: linear-gradient(135deg, #6f5bff, #5865f2 40%, #33d0ff);
    color: white;
    border: none;
    padding: 18px 34px;
    border-radius: 12px;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 0.3px;
    cursor: pointer;
    box-shadow: 0 0 25px rgba(88, 101, 242, 0.55), 0 8px 20px rgba(0,0,0,0.4);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    margin-bottom: 36px;
  }
  #open-modal-btn:hover {
    transform: translateY(-2px) scale(1.03);
    box-shadow: 0 0 40px rgba(88, 101, 242, 0.8), 0 10px 24px rgba(0,0,0,0.5);
  }
  #open-modal-btn:active {
    transform: translateY(0) scale(0.98);
  }

  /* Social links grid */
  #social-links {
    position: relative;
    z-index: 2;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 14px;
    width: 100%;
    max-width: 720px;
  }
  .social-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    color: #dbdee1;
    text-decoration: none;
    padding: 14px 16px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    backdrop-filter: blur(6px);
    transition: transform 0.15s ease, background 0.15s ease, border-color 0.15s ease;
  }
  .social-btn:hover {
    transform: translateY(-2px);
    background: rgba(255,255,255,0.08);
    border-color: rgba(255,255,255,0.2);
  }

  /* Overlay behind the modal */
  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(2px);
    justify-content: center;
    align-items: center;
    z-index: 1000;
  }
  .modal-overlay.active {
    display: flex;
  }

  /* Discord-style modal box */
  .modal-box {
    background: #313338;
    width: 440px;
    max-width: 90vw;
    border-radius: 8px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    overflow: hidden;
  }
  .modal-header {
    background: #2b2d31;
    padding: 20px 24px;
    text-align: center;
  }
  .modal-header h2 {
    margin: 0;
    color: #fff;
    font-size: 20px;
  }
  .modal-header p {
    margin: 6px 0 0;
    color: #949ba4;
    font-size: 13px;
  }
  .modal-body {
    padding: 20px 24px;
  }
  .form-group {
    margin-bottom: 16px;
  }
  .form-group label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    color: #b5bac1;
    margin-bottom: 8px;
  }
  .form-group input,
  .form-group textarea {
    width: 100%;
    box-sizing: border-box;
    background: #1e1f22;
    border: 1px solid #1e1f22;
    border-radius: 4px;
    padding: 10px;
    color: #dbdee1;
    font-size: 14px;
    font-family: inherit;
    resize: vertical;
  }
  .form-group textarea {
    min-height: 100px;
  }
  .form-group input:focus,
  .form-group textarea:focus {
    outline: none;
    border-color: #5865f2;
  }
  .modal-footer {
    background: #2b2d31;
    padding: 16px 24px;
    display: flex;
    justify-content: flex-end;
    gap: 12px;
  }
  .btn-cancel {
    background: transparent;
    color: #dbdee1;
    border: none;
    padding: 10px 16px;
    border-radius: 4px;
    cursor: pointer;
    font-weight: 500;
  }
  .btn-cancel:hover {
    text-decoration: underline;
  }
  .btn-submit {
    background: #5865f2;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 4px;
    cursor: pointer;
    font-weight: 500;
  }
  .btn-submit:hover {
    background: #4752c4;
  }
  .btn-submit:disabled {
    background: #4752c4;
    opacity: 0.6;
    cursor: not-allowed;
  }
  .error-msg {
    color: #f23f42;
    font-size: 13px;
    margin-top: 6px;
    display: none;
  }
  .status-msg {
    text-align: center;
    padding: 20px;
    font-size: 14px;
  }
</style>
</head>
<body>

<canvas id="galaxy-canvas"></canvas>

<div id="lang-switch">
  <button class="lang-btn active" id="lang-en" data-lang="en">EN</button>
  <button class="lang-btn" id="lang-fr" data-lang="fr">FR</button>
</div>

<div id="brand-tag">SnipeCorp</div>

<button id="open-modal-btn" data-i18n="cta">✦ Send a professional request to Snipepro</button>

<div id="social-links">
  <a class="social-btn" href="https://discord.com/users/1415766547321847930" target="_blank" rel="noopener">💬 Discord</a>
  <a class="social-btn" href="https://youtube.com/@snipepro_8" target="_blank" rel="noopener">▶ YouTube</a>
  <a class="social-btn" href="https://roblox.com/fr/games/75703894644091/City-Of-Fun" target="_blank" rel="noopener">🎮 Roblox</a>
  <a class="social-btn" href="https://instagram.com/3gameur1yt/" target="_blank" rel="noopener">📷 Instagram</a>
  <a class="social-btn" href="https://twitch.tv/3gameur1" target="_blank" rel="noopener">🎥 Twitch</a>
  <a class="social-btn" href="https://fortnite.gg/locker?id=3114783" target="_blank" rel="noopener">🎒 Fortnite Locker</a>
  <a class="social-btn" href="https://fortnite.gg/wishlist?id=3114783" target="_blank" rel="noopener">⭐ Fortnite Wishlist</a>
  <a class="social-btn" href="https://bento.me/matagameur" target="_blank" rel="noopener">🔗 Bento</a>
</div>

<!-- Contact modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-box">
    <div class="modal-header">
      <h2 data-i18n="modalTitle">Contact Snipepro</h2>
      <p data-i18n="modalSubtitle">Submit your professional request below</p>
    </div>
    <div class="modal-body" id="modal-body">
      <div class="form-group">
        <label for="username" data-i18n="labelUsername">Username</label>
        <input type="text" id="username" maxlength="32" data-i18n-placeholder="placeholderUsername" placeholder="Your username">
      </div>
      <div class="form-group">
        <label for="message" data-i18n="labelMessage">Message</label>
        <textarea id="message" maxlength="1000" data-i18n-placeholder="placeholderMessage" placeholder="Describe your request..."></textarea>
      </div>
      <div class="error-msg" id="error-msg"></div>
    </div>
    <div class="modal-footer" id="modal-footer">
      <button class="btn-cancel" id="cancel-btn" data-i18n="btnCancel">Cancel</button>
      <button class="btn-submit" id="submit-btn" data-i18n="btnSend">Send</button>
    </div>
  </div>
</div>

<script>
  // ⚠️ Replace this with your own Discord webhook URL
  const WEBHOOK_URL = "https://discord.com/api/webhooks/1526567795578372257/T0r-r67nrO_ptOMpy1twDr_HtCiNEsmEs_ThRJpsFDtLMQczy2UZJrYZq-0M7tta7ZO9";

  // ---- i18n ----
  const translations = {
    en: {
      cta: "✦ Send a professional request to Snipepro",
      modalTitle: "Contact Snipepro",
      modalSubtitle: "Submit your professional request below",
      labelUsername: "Username",
      placeholderUsername: "Your username",
      labelMessage: "Message",
      placeholderMessage: "Describe your request...",
      btnCancel: "Cancel",
      btnSend: "Send",
      btnSending: "Sending...",
      errFill: "Please fill in both the username and the message.",
      errSend: "Failed to send. Please check the webhook URL.",
      successMsg: "✅ Message sent successfully!"
    },
    fr: {
      cta: "✦ Envoyer une demande professionnelle à Snipepro",
      modalTitle: "Contacter Snipepro",
      modalSubtitle: "Soumets ta demande professionnelle ci-dessous",
      labelUsername: "Pseudo",
      placeholderUsername: "Ton pseudo",
      labelMessage: "Message",
      placeholderMessage: "Décris ta demande...",
      btnCancel: "Annuler",
      btnSend: "Envoyer",
      btnSending: "Envoi...",
      errFill: "Merci de remplir le pseudo et le message.",
      errSend: "Échec de l'envoi. Vérifie l'URL du webhook.",
      successMsg: "✅ Message envoyé avec succès !"
    }
  };

  let currentLang = "en"; // default language

  function applyLanguage(lang) {
    currentLang = lang;
    const t = translations[lang];

    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      if (t[key]) el.textContent = t[key];
    });
    document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
      const key = el.getAttribute('data-i18n-placeholder');
      if (t[key]) el.placeholder = t[key];
    });

    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.classList.toggle('active', btn.getAttribute('data-lang') === lang);
    });

    document.documentElement.lang = lang;
  }

  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.addEventListener('click', () => applyLanguage(btn.getAttribute('data-lang')));
  });

  // Any future feature should read strings via translations[currentLang].xxx
  // and re-render itself inside applyLanguage() so language stays in sync site-wide.

  // ---- Contact modal ----
  const openBtn = document.getElementById('open-modal-btn');
  const overlay = document.getElementById('modal-overlay');
  const cancelBtn = document.getElementById('cancel-btn');
  const submitBtn = document.getElementById('submit-btn');
  const usernameInput = document.getElementById('username');
  const messageInput = document.getElementById('message');
  const errorMsg = document.getElementById('error-msg');
  const modalBody = document.getElementById('modal-body');
  const modalFooter = document.getElementById('modal-footer');

  function openModal() {
    overlay.classList.add('active');
    errorMsg.style.display = 'none';
  }
  function closeModal() {
    overlay.classList.remove('active');
    usernameInput.value = '';
    messageInput.value = '';
  }
  openBtn.addEventListener('click', openModal);
  cancelBtn.addEventListener('click', closeModal);
  overlay.addEventListener('click', (e) => { if (e.target === overlay) closeModal(); });

  submitBtn.addEventListener('click', async () => {
    const t = translations[currentLang];
    const username = usernameInput.value.trim();
    const message = messageInput.value.trim();

    if (!username || !message) {
      errorMsg.textContent = t.errFill;
      errorMsg.style.display = 'block';
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = t.btnSending;

    try {
      const response = await fetch(WEBHOOK_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          content: `**${username}** sent a message: ${message}`
        })
      });

      if (!response.ok) {
        throw new Error("Failed to send (" + response.status + ")");
      }

      modalBody.innerHTML = `<div class="status-msg">${t.successMsg}</div>`;
      modalFooter.style.display = 'none';
      setTimeout(() => {
        closeModal();
        modalBody.innerHTML = `
          <div class="form-group">
            <label for="username" data-i18n="labelUsername">${t.labelUsername}</label>
            <input type="text" id="username" maxlength="32" data-i18n-placeholder="placeholderUsername" placeholder="${t.placeholderUsername}">
          </div>
          <div class="form-group">
            <label for="message" data-i18n="labelMessage">${t.labelMessage}</label>
            <textarea id="message" maxlength="1000" data-i18n-placeholder="placeholderMessage" placeholder="${t.placeholderMessage}"></textarea>
          </div>
          <div class="error-msg" id="error-msg"></div>`;
        modalFooter.style.display = 'flex';
        submitBtn.disabled = false;
        submitBtn.textContent = translations[currentLang].btnSend;
        // Re-bind references since we replaced the inner HTML
        window.usernameInput = document.getElementById('username');
        window.messageInput = document.getElementById('message');
        window.errorMsg = document.getElementById('error-msg');
      }, 1500);

    } catch (err) {
      errorMsg.textContent = t.errSend;
      errorMsg.style.display = 'block';
      submitBtn.disabled = false;
      submitBtn.textContent = t.btnSend;
    }
  });

  // ---- Warp-zoom space background with hidden-shape image ghosts ----
  const canvas = document.getElementById('galaxy-canvas');
  const ctx = canvas.getContext('2d');
  let width, height, cx, cy, stars;

  const IMAGE_SOURCES = [
    'assets/img1.jpg',
    'assets/img2.png',
    'assets/img3.jpg',
    'assets/img4.png',
    'assets/img5.jpeg'
  ];
  const loadedImages = [];
  IMAGE_SOURCES.forEach(src => {
    const img = new Image();
    img.src = src;
    loadedImages.push(img);
  });

  let ghosts = []; // ghost images drifting through the background
  const MAX_GHOSTS = 2;
  const GHOST_LIFETIME = 7000; // ms

  function spawnGhost() {
    if (ghosts.length >= MAX_GHOSTS) return;
    const img = loadedImages[Math.floor(Math.random() * loadedImages.length)];
    if (!img.complete || img.naturalWidth === 0) return;

    const angle = Math.random() * Math.PI * 2;
    const startRadius = 20;
    ghosts.push({
      img,
      angle,
      startRadius,
      born: performance.now(),
      size: 90 + Math.random() * 60,
      spin: (Math.random() - 0.5) * 0.4
    });
  }

  function drawGhosts(now) {
    ghosts = ghosts.filter(g => now - g.born < GHOST_LIFETIME);

    for (const g of ghosts) {
      const t = (now - g.born) / GHOST_LIFETIME; // 0 -> 1
      const radius = g.startRadius + t * (Math.max(width, height) * 0.7);
      const x = cx + Math.cos(g.angle) * radius;
      const y = cy + Math.sin(g.angle) * radius;
      const scale = 0.4 + t * 1.6;
      const size = g.size * scale;

      // fade in quickly, hold, fade out at the end
      let alpha;
      if (t < 0.15) alpha = t / 0.15;
      else if (t > 0.75) alpha = (1 - t) / 0.25;
      else alpha = 1;
      alpha *= 0.16; // keep it subtle / hidden, only the silhouette reads

      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(t * g.spin);
      ctx.globalAlpha = Math.max(0, Math.min(1, alpha));
      ctx.filter = 'grayscale(1) blur(3px) brightness(0.55) contrast(1.1)';
      ctx.drawImage(g.img, -size / 2, -size / 2, size, size);
      ctx.restore();
    }
  }

  function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
    cx = width / 2;
    cy = height / 2;
  }

  function createStars(count) {
    const arr = [];
    for (let i = 0; i < count; i++) {
      arr.push(makeStar(true));
    }
    return arr;
  }

  function makeStar(randomDepth) {
    return {
      x: (Math.random() - 0.5) * width,
      y: (Math.random() - 0.5) * height,
      z: randomDepth ? Math.random() * width : width,
      pz: 0
    };
  }

  function initGalaxy() {
    resize();
    const density = Math.floor((width * height) / 3500);
    stars = createStars(density);
    ghosts = [];
  }

  const SPEED = 2.2;

  function drawGalaxy() {
    const now = performance.now();

    ctx.fillStyle = 'rgba(5, 5, 15, 0.35)';
    ctx.fillRect(0, 0, width, height);

    // soft nebula glow, gives depth to the zoom
    const glow1 = ctx.createRadialGradient(cx, cy, 0, cx, cy, width * 0.6);
    glow1.addColorStop(0, 'rgba(111, 91, 255, 0.06)');
    glow1.addColorStop(1, 'rgba(111, 91, 255, 0)');
    ctx.fillStyle = glow1;
    ctx.fillRect(0, 0, width, height);

    ctx.filter = 'none';
    drawGhosts(now);
    ctx.globalAlpha = 1;
    ctx.filter = 'none';

    for (const s of stars) {
      s.pz = s.z;
      s.z -= SPEED;
      if (s.z <= 1) {
        Object.assign(s, makeStar(false));
        s.z = width;
        s.pz = width;
      }

      const sx = (s.x / s.z) * width + cx;
      const sy = (s.y / s.z) * width + cy;
      const px = (s.x / s.pz) * width + cx;
      const py = (s.y / s.pz) * width + cy;

      const r = Math.max(0.3, (1 - s.z / width) * 2.2);
      const alpha = Math.min(1, (1 - s.z / width) * 1.3);

      ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
      ctx.lineWidth = r;
      ctx.beginPath();
      ctx.moveTo(px, py);
      ctx.lineTo(sx, sy);
      ctx.stroke();
    }

    requestAnimationFrame(drawGalaxy);
  }

  window.addEventListener('resize', initGalaxy);
  initGalaxy();
  requestAnimationFrame(drawGalaxy);
  setInterval(spawnGhost, 3500);

  // ---- init ----
  applyLanguage(currentLang);
</script>

</body>
</html>
