<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snipepro Officiel</title>
<style>
  * { box-sizing: border-box; }
  html, body { min-height: 100%; margin: 0; font-family: 'gg sans', 'Helvetica Neue', Arial, sans-serif; }
  body { background: #05050f; color: #dbdee1; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; min-height: 100vh; padding: 130px 20px 60px; }
  #galaxy-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; background: radial-gradient(ellipse at center, #10102a 0%, #05050f 70%); }
  #brand-tag { position: fixed; top: 20px; left: 20px; z-index: 3; font-size: 20px; font-weight: 800; letter-spacing: 1px; background: linear-gradient(90deg, #8f6fff, #5865f2, #33d0ff); -webkit-background-clip: text; background-clip: text; color: transparent; text-shadow: 0 0 20px rgba(88, 101, 242, 0.4); user-select: none; }
  #lang-switch { position: fixed; top: 62px; left: 20px; z-index: 3; display: flex; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12); border-radius: 8px; overflow: hidden; backdrop-filter: blur(6px); }
  .lang-btn { background: transparent; border: none; color: #949ba4; padding: 8px 14px; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.15s; }
  .lang-btn.active { background: linear-gradient(135deg, #6f5bff, #5865f2); color: #fff; }
  #version-tag { position: fixed; bottom: 14px; right: 18px; z-index: 3; font-size: 11px; font-weight: 600; letter-spacing: 0.5px; color: #5a5e6b; user-select: none; }
  #categories { position: relative; z-index: 2; display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; width: 100%; max-width: 900px; }
  .category { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 16px; backdrop-filter: blur(6px); transition: all 0.35s ease; }
  .category-title { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.8px; color: #8b8fa3; margin-bottom: 10px; }
  .category-buttons { display: flex; flex-direction: column; gap: 10px; }
  .social-btn, .cat-btn { display: flex; align-items: center; justify-content: center; gap: 10px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #dbdee1; text-decoration: none; padding: 12px 14px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; width: 100%; transition: all 0.15s ease; }
  .social-btn:hover, .cat-btn:hover { transform: translateY(-2px); background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.25); }
  #cat-mailbox .cat-btn { background: linear-gradient(135deg, #6f5bff, #5865f2 40%, #33d0ff); border: none; color: #fff; font-size: 15px; padding: 15px 16px; box-shadow: 0 0 20px rgba(88, 101, 242, 0.45); }
  .login-btn { background: #5865f2; color: white; border: none; font-weight: 700; }
  .login-btn:hover:not(.logged-in) { background: #4752c4; }
  .logged-in { background: #3ba55c; cursor: default; pointer-events: none; }
  #cat-mailbox.disabled { opacity: 0.65; pointer-events: none; }
</style>
</head>
<body>
<canvas id="galaxy-canvas"></canvas>
<div id="brand-tag">SnipeCorp</div>
<div id="lang-switch">
  <button class="lang-btn active" id="lang-en" data-lang="en">EN</button>
  <button class="lang-btn" id="lang-fr" data-lang="fr">FR</button>
</div>
<div id="version-tag">v1.2.0</div>

<div id="categories">
  <div class="category" id="cat-mailbox">
    <div class="category-title" data-i18n="catMailbox">Mailbox</div>
    <div class="category-buttons">
      <button class="social-btn login-btn" id="discord-login-btn">🔑 <span data-i18n="loginButton">Se connecter avec Discord</span></button>
      <div id="mailbox-wrap">
        <button class="cat-btn" id="mailbox-btn">📬 <span data-i18n="mailboxLabel">Mailbox</span> ▾</button>
        <div id="mailbox-menu"></div>
      </div>
    </div>
  </div>
  <div class="category" id="cat-discord">
    <div class="category-title" data-i18n="catDiscord">Discord</div>
    <div class="category-buttons">
      <button class="social-btn" id="discord-choice-open">💬 Discord</button>
      <button class="social-btn" id="discord-servers-btn">🎲 <span data-i18n="serversLabel">Get a random serv</span></button>
    </div>
  </div>
  <div class="category" id="cat-social">
    <div class="category-title" data-i18n="catSocial">Social networks</div>
    <div class="category-buttons">
      <a class="social-btn" href="https://youtube.com/@snipepro_8" target="_blank" rel="noopener">▶ YouTube</a>
      <a class="social-btn" href="https://instagram.com/3gameur1yt/" target="_blank" rel="noopener">📷 Instagram</a>
      <a class="social-btn" href="https://twitch.tv/3gameur1" target="_blank" rel="noopener">🎥 Twitch</a>
    </div>
  </div>
  <div class="category" id="cat-fortnite">
    <div class="category-title" data-i18n="catFortnite">Fortnite</div>
    <div class="category-buttons">
      <a class="social-btn" href="https://fortnite.gg/locker?id=3114783" target="_blank" rel="noopener">🎒 Fortnite Locker</a>
      <a class="social-btn" href="https://fortnite.gg/wishlist?id=3114783" target="_blank" rel="noopener">⭐ Fortnite Wishlist</a>
    </div>
  </div>
  <div class="category" id="cat-faq">
    <div class="category-title" data-i18n="catFaq">FAQ</div>
    <div class="category-buttons" id="faq-wrap"></div>
  </div>
</div>

<script>
// CONFIG DISCORD
const CLIENT_ID = "1526891762436538460";
const REDIRECT_URI = "https://snipepro08.github.io/Snipepro08/callback";

let currentLang = "fr";
let currentUser = null;

// Traductions
const translations = {
  en: { catMailbox: "Mailbox", catDiscord: "Discord", catSocial: "Social networks", catFortnite: "Fortnite", catFaq: "FAQ", mailboxLabel: "Mailbox", serversLabel: "Get a random serv", loginButton: "Connect with Discord" },
  fr: { catMailbox: "Messagerie", catDiscord: "Discord", catSocial: "Réseaux sociaux", catFortnite: "Fortnite", catFaq: "FAQ", mailboxLabel: "Messagerie", serversLabel: "Serv Discord au hasard", loginButton: "Se connecter avec Discord" }
};

// Discord
const loginBtn = document.getElementById('discord-login-btn');
loginBtn.addEventListener('click', () => {
  if (loginBtn.classList.contains('logged-in')) return;
  const url = `https://discord.com/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=identify`;
  window.location.href = url;
});

function handleCallback() {
  const hash = window.location.hash.substring(1);
  const params = new URLSearchParams(hash);
  const token = params.get('access_token');
  if (token) {
    fetch('https://discord.com/api/users/@me', { headers: { Authorization: `Bearer ${token}` } })
    .then(r => r.json())
    .then(user => {
      currentUser = user;
      localStorage.setItem('discord_user', JSON.stringify(user));
      loginBtn.textContent = `✅ ${user.username}`;
      loginBtn.classList.add('logged-in');
      document.getElementById('cat-mailbox').classList.remove('disabled');
      window.history.replaceState({}, '', window.location.pathname);
    });
  }
}

// Langue
function applyLanguage(lang) {
  currentLang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (translations[lang][key]) el.textContent = translations[lang][key];
  });
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
}

document.querySelectorAll('.lang-btn').forEach(btn => btn.addEventListener('click', () => applyLanguage(btn.dataset.lang)));

// Galaxy
const canvas = document.getElementById('galaxy-canvas');
const ctx = canvas.getContext('2d');
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
function draw() {
  ctx.fillStyle = 'rgba(5,5,15,0.4)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  requestAnimationFrame(draw);
}
window.addEventListener('resize', resize);
resize();
draw();

// Init
handleCallback();
if (localStorage.getItem('discord_user')) {
  const u = JSON.parse(localStorage.getItem('discord_user'));
  loginBtn.textContent = `✅ ${u.username}`;
  loginBtn.classList.add('logged-in');
  document.getElementById('cat-mailbox').classList.remove('disabled');
}
applyLanguage('fr');
</script>
</body>
</html>
