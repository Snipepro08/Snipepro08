<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snipepro</title>
<style>
  * {
    box-sizing: border-box;
  }
  html, body {
    height: 100%;
    margin: 0;
    font-family: 'gg sans', 'Helvetica Neue', Arial, sans-serif;
    overflow: hidden;
  }
  body {
    background: #05050f;
    color: #dbdee1;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
  }

  /* Animated galaxy background */
  #galaxy-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    background: radial-gradient(ellipse at center, #10102a 0%, #05050f 70%);
  }

  /* SnipeCorp brand text, top right */
  #brand-tag {
    position: fixed;
    top: 20px;
    right: 28px;
    z-index: 2;
    font-size: 20px;
    font-weight: 800;
    letter-spacing: 1px;
    background: linear-gradient(90deg, #8f6fff, #5865f2, #33d0ff);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 0 0 20px rgba(88, 101, 242, 0.4);
    user-select: none;
  }

  /* Main call-to-action button */
  #open-modal-btn {
    position: relative;
    z-index: 2;
    background: linear-gradient(135deg, #6f5bff, #5865f2 40%, #33d0ff);
    color: white;
    border: none;
    padding: 18px 34px;
    border-radius: 12px;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 0.3px;
    cursor: pointer;
    box-shadow: 0 0 25px rgba(88, 101, 242, 0.55), 0 8px 20px rgba(0,0,0,0.4);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  #open-modal-btn:hover {
    transform: translateY(-2px) scale(1.03);
    box-shadow: 0 0 40px rgba(88, 101, 242, 0.8), 0 10px 24px rgba(0,0,0,0.5);
  }
  #open-modal-btn:active {
    transform: translateY(0) scale(0.98);
  }

  /* Overlay behind the modal */
  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(2px);
    justify-content: center;
    align-items: center;
    z-index: 1000;
  }
  .modal-overlay.active {
    display: flex;
  }

  /* Discord-style modal box */
  .modal-box {
    background: #313338;
    width: 440px;
    max-width: 90vw;
    border-radius: 8px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    overflow: hidden;
  }
  .modal-header {
    background: #2b2d31;
    padding: 20px 24px;
    text-align: center;
  }
  .modal-header h2 {
    margin: 0;
    color: #fff;
    font-size: 20px;
  }
  .modal-header p {
    margin: 6px 0 0;
    color: #949ba4;
    font-size: 13px;
  }
  .modal-body {
    padding: 20px 24px;
  }
  .form-group {
    margin-bottom: 16px;
  }
  .form-group label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    color: #b5bac1;
    margin-bottom: 8px;
  }
  .form-group input,
  .form-group textarea {
    width: 100%;
    box-sizing: border-box;
    background: #1e1f22;
    border: 1px solid #1e1f22;
    border-radius: 4px;
    padding: 10px;
    color: #dbdee1;
    font-size: 14px;
    font-family: inherit;
    resize: vertical;
  }
  .form-group textarea {
    min-height: 100px;
  }
  .form-group input:focus,
  .form-group textarea:focus {
    outline: none;
    border-color: #5865f2;
  }
  .modal-footer {
    background: #2b2d31;
    padding: 16px 24px;
    display: flex;
    justify-content: flex-end;
    gap: 12px;
  }
  .btn-cancel {
    background: transparent;
    color: #dbdee1;
    border: none;
    padding: 10px 16px;
    border-radius: 4px;
    cursor: pointer;
    font-weight: 500;
  }
  .btn-cancel:hover {
    text-decoration: underline;
  }
  .btn-submit {
    background: #5865f2;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 4px;
    cursor: pointer;
    font-weight: 500;
  }
  .btn-submit:hover {
    background: #4752c4;
  }
  .btn-submit:disabled {
    background: #4752c4;
    opacity: 0.6;
    cursor: not-allowed;
  }
  .error-msg {
    color: #f23f42;
    font-size: 13px;
    margin-top: 6px;
    display: none;
  }
  .status-msg {
    text-align: center;
    padding: 20px;
    font-size: 14px;
  }
</style>
</head>
<body>

<canvas id="galaxy-canvas"></canvas>
<div id="brand-tag">SnipeCorp</div>

<button id="open-modal-btn">✦ Send a professional request to Snipepro</button>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal-box">
    <div class="modal-header">
      <h2>Contact Snipepro</h2>
      <p>Submit your professional request below</p>
    </div>
    <div class="modal-body" id="modal-body">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" maxlength="32" placeholder="Your username">
      </div>
      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" maxlength="1000" placeholder="Describe your request..."></textarea>
      </div>
      <div class="error-msg" id="error-msg"></div>
    </div>
    <div class="modal-footer" id="modal-footer">
      <button class="btn-cancel" id="cancel-btn">Cancel</button>
      <button class="btn-submit" id="submit-btn">Send</button>
    </div>
  </div>
</div>

<script>
  // ⚠️ Replace this with your own Discord webhook URL
  // (Channel Settings > Integrations > Webhooks > New Webhook > Copy URL)
  const WEBHOOK_URL = "https://discord.com/api/webhooks/1526567795578372257/T0r-r67nrO_ptOMpy1twDr_HtCiNEsmEs_ThRJpsFDtLMQczy2UZJrYZq-0M7tta7ZO9";

  const openBtn = document.getElementById('open-modal-btn');
  const overlay = document.getElementById('modal-overlay');
  const cancelBtn = document.getElementById('cancel-btn');
  const submitBtn = document.getElementById('submit-btn');
  const usernameInput = document.getElementById('username');
  const messageInput = document.getElementById('message');
  const errorMsg = document.getElementById('error-msg');
  const modalBody = document.getElementById('modal-body');
  const modalFooter = document.getElementById('modal-footer');

  function openModal() {
    overlay.classList.add('active');
    errorMsg.style.display = 'none';
  }

  function closeModal() {
    overlay.classList.remove('active');
    usernameInput.value = '';
    messageInput.value = '';
  }

  openBtn.addEventListener('click', openModal);
  cancelBtn.addEventListener('click', closeModal);

  // Close modal when clicking outside the box
  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) closeModal();
  });

  submitBtn.addEventListener('click', async () => {
    const username = usernameInput.value.trim();
    const message = messageInput.value.trim();

    if (!username || !message) {
      errorMsg.textContent = "Please fill in both the username and the message.";
      errorMsg.style.display = 'block';
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = "Sending...";

    try {
      const response = await fetch(WEBHOOK_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          content: `**${username}** sent a message: ${message}`
        })
      });

      if (!response.ok) {
        throw new Error("Failed to send (" + response.status + ")");
      }

      // Show a confirmation message inside the modal
      modalBody.innerHTML = '<div class="status-msg">✅ Message sent successfully!</div>';
      modalFooter.style.display = 'none';
      setTimeout(closeModal, 1500);

    } catch (err) {
      errorMsg.textContent = "Failed to send. Please check the webhook URL.";
      errorMsg.style.display = 'block';
      submitBtn.disabled = false;
      submitBtn.textContent = "Send";
    }
  });

  // ---- Animated galaxy background ----
  const canvas = document.getElementById('galaxy-canvas');
  const ctx = canvas.getContext('2d');
  let width, height, stars;

  function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
  }

  function createStars(count) {
    const arr = [];
    for (let i = 0; i < count; i++) {
      arr.push({
        x: Math.random() * width,
        y: Math.random() * height,
        radius: Math.random() * 1.4 + 0.2,
        baseAlpha: Math.random() * 0.6 + 0.3,
        twinkleSpeed: Math.random() * 0.02 + 0.005,
        phase: Math.random() * Math.PI * 2,
        driftX: (Math.random() - 0.5) * 0.05,
        driftY: (Math.random() - 0.5) * 0.05,
        hue: Math.random() < 0.15 ? (Math.random() < 0.5 ? 260 : 190) : 0
      });
    }
    return arr;
  }

  function initGalaxy() {
    resize();
    const density = Math.floor((width * height) / 2200);
    stars = createStars(density);
  }

  function drawGalaxy(time) {
    ctx.clearRect(0, 0, width, height);

    // subtle nebula glow blobs
    const glow1 = ctx.createRadialGradient(width * 0.25, height * 0.3, 0, width * 0.25, height * 0.3, width * 0.5);
    glow1.addColorStop(0, 'rgba(111, 91, 255, 0.10)');
    glow1.addColorStop(1, 'rgba(111, 91, 255, 0)');
    ctx.fillStyle = glow1;
    ctx.fillRect(0, 0, width, height);

    const glow2 = ctx.createRadialGradient(width * 0.75, height * 0.7, 0, width * 0.75, height * 0.7, width * 0.5);
    glow2.addColorStop(0, 'rgba(51, 208, 255, 0.08)');
    glow2.addColorStop(1, 'rgba(51, 208, 255, 0)');
    ctx.fillStyle = glow2;
    ctx.fillRect(0, 0, width, height);

    for (const s of stars) {
      s.x += s.driftX;
      s.y += s.driftY;
      if (s.x < 0) s.x = width;
      if (s.x > width) s.x = 0;
      if (s.y < 0) s.y = height;
      if (s.y > height) s.y = 0;

      const twinkle = Math.sin(time * s.twinkleSpeed + s.phase) * 0.35 + 0.65;
      const alpha = s.baseAlpha * twinkle;
      const color = s.hue === 260 ? `rgba(180,160,255,${alpha})`
                  : s.hue === 190 ? `rgba(160,230,255,${alpha})`
                  : `rgba(255,255,255,${alpha})`;

      ctx.beginPath();
      ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.fill();
    }

    requestAnimationFrame(drawGalaxy);
  }

  window.addEventListener('resize', initGalaxy);
  initGalaxy();
  requestAnimationFrame(drawGalaxy);
</script>

</body>
</html>
