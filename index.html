<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SnipeCorp</title>
<style>
*{box-sizing:border-box}html,body{margin:0;height:100%;font-family:Arial,sans-serif;background:#030712;color:#fff;overflow:hidden}
#code-bg{position:fixed;inset:0;z-index:0;opacity:.18;pointer-events:none}
.code-line{position:absolute;left:-120%;white-space:nowrap;font:14px Consolas,monospace;color:#33b5ff;animation:scroll linear infinite;text-shadow:0 0 8px #33b5ff}
@keyframes scroll{from{transform:translateX(0)}to{transform:translateX(230vw)}}
body:before{content:"";position:fixed;inset:0;background:radial-gradient(circle,#0b6cff33,transparent 60%);z-index:0}
#wrap{position:relative;z-index:1;width:320px;margin:auto;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:12px;padding:24px;background:rgba(10,20,40,.45);backdrop-filter:blur(14px);border:1px solid #2b8cff55;border-radius:18px;box-shadow:0 0 30px #0b6cff55}
#brand-tag{text-align:center;font-size:28px;font-weight:800;background:linear-gradient(90deg,#7fd7ff,#2b8cff,#6ecbff);-webkit-background-clip:text;color:transparent}
#lang-switch{display:flex;justify-content:center}
.lang-btn{background:#112;border:1px solid #2b8cff55;color:#9fdfff;padding:8px 16px;cursor:pointer}
.lang-btn.active{background:#0b6cff;color:#fff}
.cat-nav-btn{text-decoration:none;color:#fff;padding:14px;border:1px solid #2b8cff66;border-radius:12px;background:#0d1628aa;transition:.25s}
.cat-nav-btn:hover{transform:translateX(6px);box-shadow:0 0 20px #2b8cff}
</style></head><body>
<div id="code-bg"></div>
<div id="wrap">
<div id="brand-tag">SnipeCorp</div>
<div id="lang-switch"><button class="lang-btn active" data-lang="en">EN</button><button class="lang-btn" data-lang="fr">FR</button></div>
<a class="cat-nav-btn" href="https://snipepro08.github.io/Snipepro08/mailbox">📬 <span data-i18n="catMailbox">Mailbox</span></a>
<a class="cat-nav-btn" href="https://snipepro08.github.io/Snipepro08/discord">💬 <span data-i18n="catDiscord">Discord</span></a>
<a class="cat-nav-btn" href="https://snipepro08.github.io/Snipepro08/social">🌐 <span data-i18n="catSocial">Social networks</span></a>
<a class="cat-nav-btn" href="https://snipepro08.github.io/Snipepro08/fortnite">🎒 <span data-i18n="catFortnite">Fortnite</span></a>
<a class="cat-nav-btn" href="https://snipepro08.github.io/Snipepro08/game">🕹 <span data-i18n="catGame">Game</span></a>
<a class="cat-nav-btn" href="https://snipepro08.github.io/Snipepro08/faq">❓ <span data-i18n="catFaq">FAQ</span></a>
</div>
<script>
const tr={en:{catMailbox:"Mailbox",catDiscord:"Discord",catSocial:"Social networks",catFortnite:"Fortnite",catGame:"Game",catFaq:"FAQ"},fr:{catMailbox:"Messagerie",catDiscord:"Discord",catSocial:"Réseaux sociaux",catFortnite:"Fortnite",catGame:"Jeu",catFaq:"FAQ"}};
document.querySelectorAll(".lang-btn").forEach(b=>b.onclick=()=>{document.querySelectorAll(".lang-btn").forEach(x=>x.classList.remove("active"));b.classList.add("active");let t=tr[b.dataset.lang];document.querySelectorAll("[data-i18n]").forEach(e=>e.textContent=t[e.dataset.i18n]);});
const code=["const client = new Discord.Client();","fetch('/api');","while(true){render();}","console.log('SnipeCorp');","git commit -m 'update';","npm install","SELECT * FROM users;","client.login(TOKEN);","return response.json();"];
const bg=document.getElementById("code-bg");
for(let i=0;i<80;i++){let d=document.createElement("div");d.className="code-line";d.textContent=code[Math.floor(Math.random()*code.length)];d.style.top=(i*18)+"px";d.style.animationDuration=(15+Math.random()*20)+"s";d.style.animationDelay=(-Math.random()*25)+"s";d.style.fontSize=(12+Math.random()*4)+"px";bg.appendChild(d);}
</script></body></html>
