<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>SnipeCorp</title>
<style>
  body {
    font-family: 'gg sans', 'Helvetica Neue', Arial, sans-serif;
    background: #313338;
    color: #dbdee1;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
  }

  /* Bouton qui ouvre le modal */
  #open-modal-btn {
    background: #5865f2;
    color: white;
    border: none;
    padding: 12px 24px;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
  }
  #open-modal-btn:hover {
    background: #4752c4;
  }

  /* Overlay sombre derrière le modal */
  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.6);
    justify-content: center;
    align-items: center;
    z-index: 1000;
  }
  .modal-overlay.active {
    display: flex;
  }

  /* Boîte du modal, style Discord */
  .modal-box {
    background: #313338;
    width: 440px;
    max-width: 90vw;
    border-radius: 8px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    overflow: hidden;
  }
  .modal-header {
    background: #2b2d31;
    padding: 20px 24px;
    text-align: center;
  }
  .modal-header h2 {
    margin: 0;
    color: #fff;
    font-size: 20px;
  }
  .modal-body {
    padding: 20px 24px;
  }
  .form-group {
    margin-bottom: 16px;
  }
  .form-group label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    color: #b5bac1;
    margin-bottom: 8px;
  }
  .form-group input,
  .form-group textarea {
    width: 100%;
    box-sizing: border-box;
    background: #1e1f22;
    border: 1px solid #1e1f22;
    border-radius: 4px;
    padding: 10px;
    color: #dbdee1;
    font-size: 14px;
    font-family: inherit;
    resize: vertical;
  }
  .form-group textarea {
    min-height: 100px;
  }
  .form-group input:focus,
  .form-group textarea:focus {
    outline: none;
    border-color: #5865f2;
  }
  .modal-footer {
    background: #2b2d31;
    padding: 16px 24px;
    display: flex;
    justify-content: flex-end;
    gap: 12px;
  }
  .btn-cancel {
    background: transparent;
    color: #dbdee1;
    border: none;
    padding: 10px 16px;
    border-radius: 4px;
    cursor: pointer;
    font-weight: 500;
  }
  .btn-cancel:hover {
    text-decoration: underline;
  }
  .btn-submit {
    background: #5865f2;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 4px;
    cursor: pointer;
    font-weight: 500;
  }
  .btn-submit:hover {
    background: #4752c4;
  }
  .btn-submit:disabled {
    background: #4752c4;
    opacity: 0.6;
    cursor: not-allowed;
  }
  .error-msg {
    color: #f23f42;
    font-size: 13px;
    margin-top: 6px;
    display: none;
  }
  .status-msg {
    text-align: center;
    padding: 20px;
    font-size: 14px;
  }
</style>
</head>
<body>

<button id="open-modal-btn">Send A Message In Discord Server Of Snipepro</button>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal-box">
    <div class="modal-header">
      <h2>Send A Message</h2>
    </div>
    <div class="modal-body" id="modal-body">
      <div class="form-group">
        <label for="username">Pseudo</label>
        <input type="text" id="username" maxlength="32" placeholder="Ton pseudo">
      </div>
      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" maxlength="1000" placeholder="Écris ton message..."></textarea>
      </div>
      <div class="error-msg" id="error-msg"></div>
    </div>
    <div class="modal-footer" id="modal-footer">
      <button class="btn-cancel" id="cancel-btn">Cancel</button>
      <button class="btn-submit" id="submit-btn">Send</button>
    </div>
  </div>
</div>

<script>
  // ⚠️ Remplace cette URL par ton propre webhook Discord
  // (Paramètres du salon > Intégrations > Webhooks > Nouveau Webhook > Copier l'URL)
  const WEBHOOK_URL = "https://discord.com/api/webhooks/1526567795578372257/T0r-r67nrO_ptOMpy1twDr_HtCiNEsmEs_ThRJpsFDtLMQczy2UZJrYZq-0M7tta7ZO9";

  const openBtn = document.getElementById('open-modal-btn');
  const overlay = document.getElementById('modal-overlay');
  const cancelBtn = document.getElementById('cancel-btn');
  const submitBtn = document.getElementById('submit-btn');
  const usernameInput = document.getElementById('username');
  const messageInput = document.getElementById('message');
  const errorMsg = document.getElementById('error-msg');
  const modalBody = document.getElementById('modal-body');
  const modalFooter = document.getElementById('modal-footer');

  function openModal() {
    overlay.classList.add('active');
    errorMsg.style.display = 'none';
  }

  function closeModal() {
    overlay.classList.remove('active');
    usernameInput.value = '';
    messageInput.value = '';
  }

  openBtn.addEventListener('click', openModal);
  cancelBtn.addEventListener('click', closeModal);

  // Ferme le modal si on clique en dehors de la boîte
  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) closeModal();
  });

  submitBtn.addEventListener('click', async () => {
    const username = usernameInput.value.trim();
    const message = messageInput.value.trim();

    if (!username || !message) {
      errorMsg.textContent = "Merci de remplir le pseudo et le message.";
      errorMsg.style.display = 'block';
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = "Envoi...";

    try {
      const response = await fetch(WEBHOOK_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          content: `**${username}** Has Send : ${message}`
        })
      });

      if (!response.ok) {
        throw new Error("Error (" + response.status + ")");
      }

      // Affiche un message de confirmation dans le modal
      modalBody.innerHTML = '<div class="status-msg">✅ Message Send Tkx For Using Our Services</div>';
      modalFooter.style.display = 'none';
      setTimeout(closeModal, 1500);

    } catch (err) {
      errorMsg.textContent = "Error type:url";
      errorMsg.style.display = 'block';
      submitBtn.disabled = false;
      submitBtn.textContent = "Envoyer";
    }
  });
</script>

</body>
</html>
