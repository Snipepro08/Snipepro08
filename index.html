<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snipepro Officiel</title>
<style>
  * {
    box-sizing: border-box;
  }
  html, body {
    min-height: 100%;
    margin: 0;
    font-family: 'gg sans', 'Helvetica Neue', Arial, sans-serif;
  }
  body {
    background: #05050f;
    color: #dbdee1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    position: relative;
    min-height: 100vh;
    padding: 130px 20px 60px;
  }

  #galaxy-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    background: radial-gradient(ellipse at center, #10102a 0%, #05050f 70%);
  }

  #brand-tag {
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 3;
    font-size: 20px;
    font-weight: 800;
    letter-spacing: 1px;
    background: linear-gradient(90deg, #8f6fff, #5865f2, #33d0ff);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 0 0 20px rgba(88, 101, 242, 0.4);
    user-select: none;
  }

  #lang-switch {
    position: fixed;
    top: 62px;
    left: 20px;
    z-index: 3;
    display: flex;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    overflow: hidden;
    backdrop-filter: blur(6px);
    transition: opacity 0.35s ease, transform 0.35s ease;
  }
  .lang-btn {
    background: transparent;
    border: none;
    color: #949ba4;
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s ease, color 0.15s ease;
  }
  .lang-btn.active {
    background: linear-gradient(135deg, #6f5bff, #5865f2);
    color: #fff;
  }
  .lang-btn:not(.active):hover {
    background: rgba(255,255,255,0.08);
    color: #dbdee1;
  }

  #version-tag {
    position: fixed;
    bottom: 14px;
    right: 18px;
    z-index: 3;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
    color: #5a5e6b;
    user-select: none;
  }

  #categories {
    position: relative;
    z-index: 2;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 16px;
    width: 100%;
    max-width: 900px;
  }
  .category {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 16px;
    backdrop-filter: blur(6px);
    transition: opacity 0.35s ease, transform 0.35s ease;
  }
  .category-title {
    font-size: 11px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: #8b8fa3;
    margin-bottom: 10px;
  }
  .category-buttons {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  body.cta-focus .category {
    opacity: 0;
    transform: translateY(10px);
    pointer-events: none;
  }
  body.cta-focus .category.active-hover {
    opacity: 1;
    transform: none;
    pointer-events: auto;
  }

  .social-btn, .cat-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    color: #dbdee1;
    text-decoration: none;
    padding: 12px 14px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    transition: transform 0.15s ease, background 0.15s ease, border-color 0.15s ease;
  }
  .social-btn:hover, .cat-btn:hover {
    transform: translateY(-2px);
    background: rgba(255,255,255,0.1);
    border-color: rgba(255,255,255,0.25);
  }

  #cat-mailbox .cat-btn {
    background: linear-gradient(135deg, #6f5bff, #5865f2 40%, #33d0ff);
    border: none;
    color: #fff;
    font-size: 15px;
    padding: 15px 16px;
    box-shadow: 0 0 20px rgba(88, 101, 242, 0.45);
  }
  #cat-mailbox .cat-btn:hover {
    box-shadow: 0 0 32px rgba(88, 101, 242, 0.75);
  }

  #mailbox-wrap {
    position: relative;
  }
  #mailbox-menu {
    display: none;
    position: absolute;
    top: calc(100% + 8px);
    left: 0;
    right: 0;
    background: #1a1b1e;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    overflow: hidden;
    z-index: 6;
  }
  #mailbox-wrap.open #mailbox-menu {
    display: block;
  }
  .menu-item {
    display: block;
    width: 100%;
    text-align: left;
    background: none;
    border: none;
    color: #dbdee1;
    padding: 12px 14px;
    font-size: 13px;
    cursor: pointer;
  }
  .menu-item:hover {
    background: rgba(88,101,242,0.18);
  }
  .menu-item + .menu-item {
    border-top: 1px solid rgba(255,255,255,0.06);
  }

  #faq-wrap {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .faq-btn {
    text-align: left;
    font-size: 13px;
  }

  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(2px);
    justify-content: center;
    align-items: center;
    z-index: 1000;
  }

    display: flex;
  }

    background: #313338;
    width: 440px;
    max-width: 90vw;
    border-radius: 8px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);

    background: #2b2d31;
    padding: 20px 24px;
    text-align: center;
  }

    margin: 0;
    color: #fff;
    font-size: 20px;
  }
  .modal-header p {
    margin: 6px 0 0;
    color: #949ba4;
    font-size: 13px;
  }
  .modal-body {
    padding: 20px 24px;
  }
  .form-group {

  }
  .form-group label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    color: #b5bac1;
    margin-bottom: 8px;
  }
  .form-group input,

    width: 100%;
    box-sizing: border-box;
    background: #1e1f22;
    border: 1px solid #1e1f22;
    border-radius: 4px;
    padding: 10px;
    color: #dbdee1;
    font-size: 14px;
    font-family: inherit;
    resize: vertical;
  }
  .form-group textarea {
    min-height: 90px;
  }
  .form-group input:focus,

    outline: none;
    border-color: #5865f2;
  }
  .form-note {
    font-size: 12px;
    color: #949ba4;
    margin: 0 0 16px;
    line-height: 1.5;
  }
  .modal-footer {
    background: #2b2d31;
    padding: 16px 24px;
    display: flex;
    justify-content: flex-end;
    gap: 12px;
  }
  .btn-cancel {
    background: transparent;
    color: #dbdee1;
    border: none;
    padding: 10px 16px;
    border-radius: 4px;
    cursor: pointer;
    font-weight: 500;
  }
  .btn-cancel:hover {
    text-decoration: underline;
  }
  .btn-submit {
    background: #5865f2;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 4px;
    cursor: pointer;
    font-weight: 500;
  }
  .btn-submit:hover {
    background: #4752c4;
  }
  .btn-submit:disabled {
    background: #4752c4;
    opacity: 0.6;
    cursor: not-allowed;
  }
  .error-msg {
    color: #f23f42;
    font-size: 13px;
    margin-top: 6px;
    display: none;
  }
  .status-msg {

    padding: 20px;
    font-size: 14px;
  }
  .faq-answer {

    line-height: 1.7;
    color: #dbdee1;

  .widget-modal-box {

        { id: 'discordUsername', labelKey: 'labelDiscordUsername', placeholderKey: 'placeholderDiscordUsername', type: 'text' },
        { id: 'message', labelKey: 'labelMessage', placeholderKey: 'placeholderMessage', type: 'textarea' }
      ],
      buildContent: (v) => `📩 **${v.discordUsername}** requested a collab:\n${v.message}`
    },
    {
      id: 'webhook',
      menuKey: 'mailboxWebhook',
      titleKey: 'webhookModalTitle',
      subtitleKey: 'webhookModalSubtitle',
      fields: [
        { id: 'discordUsername', labelKey: 'labelDiscordUsername', placeholderKey: 'placeholderDiscordUsername', type: 'text' },
        { id: 'webhookUrl', labelKey: 'labelWebhookUrl', placeholderKey: 'placeholderWebhookUrl', type: 'text' }
      ],
      buildContent: (v) => `🔗 **${v.discordUsername}** proposed their webhook: ${v.webhookUrl}`
    },
    {
      id: 'roblox',
      menuKey: 'mailboxRoblox',
      titleKey: 'robloxModalTitle',
      subtitleKey: 'robloxModalSubtitle',
      fields: [
        { id: 'discordUsername', labelKey: 'labelDiscordUsername', placeholderKey: 'placeholderDiscordUsername', type: 'text' },
        { id: 'gameLink', labelKey: 'labelGameLink', placeholderKey: 'placeholderGameLink', type: 'text' },
        { id: 'message', labelKey: 'labelGameDescription', placeholderKey: 'placeholderGameDescription', type: 'textarea' }
      ],
      buildContent: (v) => `🎮 **${v.discordUsername}** submitted a Roblox game for City Of Fun\nLink: ${v.gameLink}\n${v.message}`
    },
    {
      id: 'serverAdd',
      menuKey: 'mailboxServerAdd',
      titleKey: 'serverAddModalTitle',
      subtitleKey: 'serverAddModalSubtitle',
      noteKey: 'serverAddNote',
      fields: [
        { id: 'discordUsername', labelKey: 'labelDiscordUsername', placeholderKey: 'placeholderDiscordUsername', type: 'text' },
        { id: 'serverInfo', labelKey: 'labelServerInfo', placeholderKey: 'placeholderServerInfo', type: 'text' }
      ],
      buildContent: (v) => `➕ **${v.discordUsername}** submitted a server for the random pool: ${v.serverInfo}\n(Pending staff review)`
    },
    {
      id: 'report',
      menuKey: 'mailboxReport',
      titleKey: 'reportModalTitle',
      subtitleKey: 'reportModalSubtitle',
      fields: [
        { id: 'discordUsername', labelKey: 'labelDiscordUsername', placeholderKey: 'placeholderDiscordUsername', type: 'text' },
        { id: 'reportedUser', labelKey: 'labelReportedUser', placeholderKey: 'placeholderReportedUser', type: 'text' },
        { id: 'reason', labelKey: 'labelReportReason', placeholderKey: 'placeholderReportReason', type: 'textarea' }
      ],
      buildContent: (v) => `🚨 **${v.discordUsername}** reported a user: ${v.reportedUser}\nReason: ${v.reason}`
    }
  ];

  const FAQ_ITEMS = [
    { id: 'webhook', qKey: 'faqWebhookQ', aKey: 'faqWebhookA' },
    { id: 'dmPhone', qKey: 'faqDmPhoneQ', aKey: 'faqDmPhoneA' },
    { id: 'dmPc', qKey: 'faqDmPcQ', aKey: 'faqDmPcA' },
    { id: 'data', qKey: 'faqDataQ', aKey: 'faqDataA' }
  ];

  function renderMailboxMenu() {
    const t = translations[currentLang];
    const menu = document.getElementById('mailbox-menu');
    menu.innerHTML = '';
    MAILBOX_OPTIONS.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'menu-item';
      btn.textContent = t[opt.menuKey];
      btn.addEventListener('click', () => openMailboxModal(opt.id));
      menu.appendChild(btn);
    });
  }

  function renderFaqButtons() {
    const t = translations[currentLang];
    const wrap = document.getElementById('faq-wrap');
    wrap.innerHTML = '';
    FAQ_ITEMS.forEach(item => {
      const btn = document.createElement('button');
      btn.className = 'social-btn faq-btn';
      btn.textContent = '❓ ' + t[item.qKey];
      btn.addEventListener('click', () => openFaqModal(item.id));
      wrap.appendChild(btn);
    });
  }

  function applyLanguage(lang) {
    currentLang = lang;
    const t = translations[lang];

    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      if (t[key]) el.textContent = t[key];
    });

    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.classList.toggle('active', btn.getAttribute('data-lang') === lang);
    });

    document.documentElement.lang = lang;
    document.title = t.pageTitle;

    renderMailboxMenu();
    renderFaqButtons();
  }

  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.addEventListener('click', () => applyLanguage(btn.getAttribute('data-lang')));
  });

  // Any future feature should read strings via translations[currentLang].xxx
  // and re-render itself inside applyLanguage() so language stays in sync site-wide.

  // ---- Category hover focus ----
  let intensify = false;
  document.querySelectorAll('.category').forEach(cat => {
    cat.addEventListener('mouseenter', () => {
      intensify = true;
      document.body.classList.add('cta-focus');
      cat.classList.add('active-hover');
    });
    cat.addEventListener('mouseleave', () => {
      intensify = false;
      document.body.classList.remove('cta-focus');
      cat.classList.remove('active-hover');
    });
  });

  // ---- Mailbox dropdown ----
  const mailboxWrap = document.getElementById('mailbox-wrap');
  const mailboxBtn = document.getElementById('mailbox-btn');
  mailboxBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    mailboxWrap.classList.toggle('open');
  });
  document.addEventListener('click', () => mailboxWrap.classList.remove('open'));

  // ---- Generic mailbox modal ----
  const mailboxOverlay = document.getElementById('mailbox-overlay');
  const mailboxTitleEl = document.getElementById('mailbox-modal-title');
  const mailboxSubtitleEl = document.getElementById('mailbox-modal-subtitle');
  const mailboxBodyEl = document.getElementById('mailbox-modal-body');
  const mailboxFooterEl = document.getElementById('mailbox-modal-footer');
  const mailboxCancelBtn = document.getElementById('mailbox-cancel-btn');
  const mailboxSubmitBtn = document.getElementById('mailbox-submit-btn');
  let currentMailboxOption = null;

  function fieldHTML(f, t) {
    const label = t[f.labelKey];
    const placeholder = t[f.placeholderKey];
    if (f.type === 'textarea') {
      return `<div class="form-group">
        <label>${label}</label>
        <textarea id="mb-${f.id}" placeholder="${placeholder}"></textarea>
      </div>`;
    }
    return `<div class="form-group">
      <label>${label}</label>
      <input type="text" id="mb-${f.id}" placeholder="${placeholder}">
    </div>`;
  }

  function renderMailboxModal() {
    const t = translations[currentLang];
    const opt = currentMailboxOption;
    mailboxTitleEl.textContent = t[opt.titleKey];
    mailboxSubtitleEl.textContent = t[opt.subtitleKey];

    let html = opt.fields.map(f => fieldHTML(f, t)).join('');
    if (opt.noteKey) html += `<p class="form-note">${t[opt.noteKey]}</p>`;
    html += `<p class="form-note">${t.dmNote}</p>`;
    html += `<div class="error-msg" id="mailbox-error-msg"></div>`;
    mailboxBodyEl.innerHTML = html;

    mailboxFooterEl.style.display = 'flex';
    mailboxSubmitBtn.disabled = false;
    mailboxSubmitBtn.textContent = t.btnSend;
  }

  function openMailboxModal(optionId) {
    currentMailboxOption = MAILBOX_OPTIONS.find(o => o.id === optionId);
    mailboxWrap.classList.remove('open');
    renderMailboxModal();
    mailboxOverlay.classList.add('active');
  }
  function closeMailboxModal() {
    mailboxOverlay.classList.remove('active');
  }
  mailboxCancelBtn.addEventListener('click', closeMailboxModal);
  mailboxOverlay.addEventListener('click', (e) => { if (e.target === mailboxOverlay) closeMailboxModal(); });

  mailboxSubmitBtn.addEventListener('click', async () => {
    const t = translations[currentLang];
    const opt = currentMailboxOption;
    const values = {};
    let hasEmpty = false;

    opt.fields.forEach(f => {
      const el = document.getElementById('mb-' + f.id);
      const val = el.value.trim();
      if (!val) hasEmpty = true;
      values[f.id] = val;
    });

    const errorMsg = document.getElementById('mailbox-error-msg');
    if (hasEmpty) {
      errorMsg.textContent = t.errFillAll;
      errorMsg.style.display = 'block';
      return;
    }

    mailboxSubmitBtn.disabled = true;
    mailboxSubmitBtn.textContent = t.btnSending;

    try {
      const response = await fetch(WEBHOOK_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ content: opt.buildContent(values) })
      });
      if (!response.ok) throw new Error("Failed to send (" + response.status + ")");

      mailboxBodyEl.innerHTML = `<div class="status-msg">${t.successMsg}</div>`;
      mailboxFooterEl.style.display = 'none';
      setTimeout(() => {
        closeMailboxModal();
      }, 1500);
    } catch (err) {
      errorMsg.textContent = t.errSend;
      errorMsg.style.display = 'block';
      mailboxSubmitBtn.disabled = false;
      mailboxSubmitBtn.textContent = t.btnSend;
    }
  });

  // ---- FAQ modal ----
  const faqOverlay = document.getElementById('faq-overlay');
  const faqTitleEl = document.getElementById('faq-modal-title');
  const faqAnswerEl = document.getElementById('faq-modal-answer');
  const faqCloseBtn = document.getElementById('faq-close-btn');

  function openFaqModal(itemId) {
    const t = translations[currentLang];
    const item = FAQ_ITEMS.find(i => i.id === itemId);
    faqTitleEl.textContent = t[item.qKey];
    faqAnswerEl.textContent = t[item.aKey];
    faqOverlay.classList.add('active');
  }
  faqCloseBtn.addEventListener('click', () => faqOverlay.classList.remove('active'));
  faqOverlay.addEventListener('click', (e) => { if (e.target === faqOverlay) faqOverlay.classList.remove('active'); });

  // ---- Discord choice popup (profile vs bot) ----
  const discordChoiceOpen = document.getElementById('discord-choice-open');
  const discordChoiceOverlay = document.getElementById('discord-choice-overlay');
  discordChoiceOpen.addEventListener('click', () => discordChoiceOverlay.classList.add('active'));
  discordChoiceOverlay.addEventListener('click', (e) => {
    if (e.target === discordChoiceOverlay) discordChoiceOverlay.classList.remove('active');
  });

  // ---- "Gacha" random Discord server button ----
  const serversBtn = document.getElementById('discord-servers-btn');
  serversBtn.addEventListener('click', () => {
    const randomServer = DISCORD_SERVERS[Math.floor(Math.random() * DISCORD_SERVERS.length)];
    openServerWidget(randomServer);
  });

  // ---- Discord widget popup ----
  const widgetOverlay = document.getElementById('widget-overlay');
  const widgetBox = document.getElementById('widget-box');

  function openServerWidget(server) {
    const t = translations[currentLang];
    widgetBox.innerHTML = `
      <button class="widget-close-btn" id="widget-close-btn">${t.widgetClose} ✕</button>
      <iframe src="https://discord.com/widget?id=${server.id}&theme=dark"
        width="350" height="500" allowtransparency="true" frameborder="0"
        sandbox="allow-popups allow-popups-to-escape-sandbox allow-same-origin allow-scripts"></iframe>
    `;
    document.getElementById('widget-close-btn').addEventListener('click', closeServerWidget);
    widgetOverlay.classList.add('active');
  }
  function closeServerWidget() {
    widgetOverlay.classList.remove('active');
    widgetBox.innerHTML = '';
  }
  widgetOverlay.addEventListener('click', (e) => {
    if (e.target === widgetOverlay) closeServerWidget();
  });

  // ---- Warp-zoom space background with hidden-shape image ghosts ----
  const canvas = document.getElementById('galaxy-canvas');
  const ctx = canvas.getContext('2d');
  let width, height, cx, cy, stars;

  const IMAGE_SOURCES = [
    'assets/img1.jpg',
    'assets/img2.png',
    'assets/img3.jpg',
    'assets/img4.png',
    'assets/img5.jpeg'
  ];
  const loadedImages = [];
  IMAGE_SOURCES.forEach(src => {
    const img = new Image();
    img.src = src;
    loadedImages.push(img);
  });

  let ghosts = [];
  const MAX_GHOSTS = 2;
  const GHOST_LIFETIME = 7000;

  function spawnGhost() {
    if (ghosts.length >= MAX_GHOSTS) return;
    const img = loadedImages[Math.floor(Math.random() * loadedImages.length)];
    if (!img.complete || img.naturalWidth === 0) return;

    const angle = Math.random() * Math.PI * 2;
    ghosts.push({
      img,
      angle,
      startRadius: 20,
      born: performance.now(),
      size: 90 + Math.random() * 60,
      spin: (Math.random() - 0.5) * 0.4
    });
  }

  function drawGhosts(now) {
    ghosts = ghosts.filter(g => now - g.born < GHOST_LIFETIME);

    for (const g of ghosts) {
      const t = (now - g.born) / GHOST_LIFETIME;
      const radius = g.startRadius + t * (Math.max(width, height) * 0.7);
      const x = cx + Math.cos(g.angle) * radius;
      const y = cy + Math.sin(g.angle) * radius;
      const scale = 0.4 + t * 1.6;
      const size = g.size * scale;

      let alpha;
      if (t < 0.15) alpha = t / 0.15;
      else if (t > 0.75) alpha = (1 - t) / 0.25;
      else alpha = 1;
      alpha *= intensify ? 0.28 : 0.16;

      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(t * g.spin);
      ctx.globalAlpha = Math.max(0, Math.min(1, alpha));
      ctx.filter = 'grayscale(1) blur(3px) brightness(0.55) contrast(1.1)';
      ctx.drawImage(g.img, -size / 2, -size / 2, size, size);
      ctx.restore();
    }
  }

  function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
    cx = width / 2;
    cy = height / 2;
  }

  function makeStar(randomDepth) {
    return {
      x: (Math.random() - 0.5) * width,
      y: (Math.random() - 0.5) * height,
      z: randomDepth ? Math.random() * width : width,
      pz: 0
    };
  }

  function initGalaxy() {
    resize();
    const density = Math.floor((width * height) / 3500);
    stars = [];
    for (let i = 0; i < density; i++) stars.push(makeStar(true));
    ghosts = [];
  }

  const BASE_SPEED = 2.2;
  const INTENSE_SPEED = 9;
  let currentSpeed = BASE_SPEED;

  function drawGalaxy() {
    const now = performance.now();
    const targetSpeed = intensify ? INTENSE_SPEED : BASE_SPEED;
    currentSpeed += (targetSpeed - currentSpeed) * 0.06;

    ctx.fillStyle = 'rgba(5, 5, 15, 0.35)';
    ctx.fillRect(0, 0, width, height);

    const glowStrength = intensify ? 0.15 : 0.06;
    const glow1 = ctx.createRadialGradient(cx, cy, 0, cx, cy, width * 0.6);
    glow1.addColorStop(0, `rgba(111, 91, 255, ${glowStrength})`);
    glow1.addColorStop(1, 'rgba(111, 91, 255, 0)');
    ctx.fillStyle = glow1;
    ctx.fillRect(0, 0, width, height);

    ctx.filter = 'none';
    drawGhosts(now);
    ctx.globalAlpha = 1;
    ctx.filter = 'none';

    for (const s of stars) {
      s.pz = s.z;
      s.z -= currentSpeed;
      if (s.z <= 1) {
        Object.assign(s, makeStar(false));
        s.z = width;
        s.pz = width;
      }

      const sx = (s.x / s.z) * width + cx;
      const sy = (s.y / s.z) * width + cy;
      const px = (s.x / s.pz) * width + cx;
      const py = (s.y / s.pz) * width + cy;

      const r = Math.max(0.3, (1 - s.z / width) * (intensify ? 3 : 2.2));
      const alpha = Math.min(1, (1 - s.z / width) * (intensify ? 1.6 : 1.3));

      ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
      ctx.lineWidth = r;
      ctx.beginPath();
      ctx.moveTo(px, py);
      ctx.lineTo(sx, sy);
      ctx.stroke();
    }

    requestAnimationFrame(drawGalaxy);
  }

  window.addEventListener('resize', initGalaxy);
  initGalaxy();
  requestAnimationFrame(drawGalaxy);
  setInterval(spawnGhost, 3500);

  // ---- init ----
  document.getElementById('version-tag').textContent = 'v' + SITE_VERSION;
  applyLanguage(currentLang);
</script>
